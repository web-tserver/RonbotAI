<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>RonBot ¬Ј Location & Weather Fixed</title>
    <style>
        :root {
            --mood-color: #00e0fc;
            --mood-glow: rgba(0, 224, 252, 0.6);
            --bg-light: #f0f2f5;
            --bg-dark: #030a0c;
            --screen-bg: #030a0c;
            --casing-top: #f5f5f5;
            --casing-bottom: #b0b0b0;
        }
        body.dark { --bg-light: var(--bg-dark); --casing-top: #2a2a2a; --casing-bottom: #111; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, sans-serif; background: var(--bg-light);
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            overflow:hidden; user-select:none; touch-action:manipulation;
            position:fixed; inset:0; -webkit-tap-highlight-color:transparent;
        }
        .bg-grid {
            position:fixed; inset:0; z-index:0; pointer-events:none;
            background-image:radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size:40px 40px;
        }
        .boot-screen {
            position:fixed; inset:0; z-index:9999; background:#000;
            display:flex; align-items:center; justify-content:center;
            color:#00e0fc; font-size:2rem; font-weight:bold; letter-spacing:4px;
            animation:bootFade 2s forwards; pointer-events:none;
        }
        @keyframes bootFade { 0%{opacity:1;} 80%{opacity:1;} 100%{opacity:0; display:none;} }
        .flash-overlay {
            position:fixed; inset:0; z-index:999; pointer-events:none;
            background:rgba(255,255,255,0.9); opacity:0; transition:opacity 0.1s;
        }
        .flash-overlay.active { opacity:1; }
        .bolt {
            position:fixed; z-index:1000; pointer-events:none;
            background:#fff; height:3px; opacity:0;
            box-shadow:0 0 15px #4af0ff, 0 0 30px #00e5ff;
            transform-origin:left center; animation:bolt-strike 0.5s ease-out forwards;
        }
        @keyframes bolt-strike { 0%{opacity:0;width:0;} 20%{opacity:1;width:var(--w);} 80%{opacity:1;} 100%{opacity:0;} }
        @keyframes particle-fly { 0%{opacity:1;transform:translate(0,0) scale(1);} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0);} }

        .robot-wrapper {
            position:fixed; width:min(200px,45vmin); height:min(200px,45vmin);
            cursor:grab; z-index:10; filter:drop-shadow(0 0 15px var(--mood-glow));
        }
        .robot-wrapper:active { cursor:grabbing; }
        .antenna {
            position:absolute; top:-34px; left:50%; transform:translateX(-50%);
            width:6px; height:36px; background:#4a5a6a; border-radius:4px 4px 0 0; z-index:6; cursor:pointer;
        }
        .antenna::after {
            content:''; position:absolute; top:-12px; left:50%; transform:translateX(-50%);
            width:16px; height:16px; background:var(--mood-color); border-radius:50%;
            box-shadow:0 0 18px var(--mood-color), 0 0 35px var(--mood-glow);
            animation:antenna-pulse 2s infinite;
        }
        @keyframes antenna-pulse { 0%,100%{opacity:0.7; transform:translateX(-50%) scale(1);} 50%{opacity:1; transform:translateX(-50%) scale(1.25);} }
        .ear {
            position:absolute; top:50%; transform:translateY(-50%);
            width:14px; height:45%; background:#3a4a5a; border-radius:7px; z-index:-1; cursor:pointer;
        }
        .ear.left { left:-8px; } .ear.right { right:-8px; }
        .head-casing {
            width:100%; height:100%;
            background:linear-gradient(180deg, var(--casing-top) 0%, var(--casing-bottom) 100%);
            border:6px solid #333; border-radius:28px;
            display:flex; justify-content:center; align-items:center;
            box-shadow:0 12px 30px rgba(0,0,0,0.25), 0 0 20px var(--mood-glow);
            padding:8px; box-sizing:border-box;
        }
        body.dark .head-casing { border-color:#555; }
        .head-casing.shake { animation:shake 0.4s ease-in-out; }
        .head-casing.spin { animation:spin-head 0.6s ease-in-out; }
        @keyframes shake { 0%,100%{transform:translate(0,0);} 25%{transform:translate(-5px,2px);} 75%{transform:translate(5px,-2px);} }
        @keyframes spin-head { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

        .face-screen {
            width:100%; height:100%; background-color:var(--screen-bg); border-radius:22px; position:relative;
            box-shadow:inset 0px 0px 30px rgba(0,0,0,1), inset -5px -7px 7px -2px rgba(255,255,255,0.25);
            display:flex; justify-content:center; align-items:center; overflow:hidden;
        }
        .face-screen::after {
            content:""; position:absolute; top:0;left:0;right:0;bottom:0;
            background:linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%),
                       linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
            background-size:100% 3px, 3px 100%; z-index:10; pointer-events:none;
            animation:flicker 0.15s infinite;
        }
        @keyframes flicker { 0%{opacity:0.92;} 50%{opacity:0.82;} 100%{opacity:0.92;} }

        .face { display:flex; flex-direction:column; align-items:center; z-index:5;
            filter:drop-shadow(0 0 6px var(--mood-color)) drop-shadow(0 0 16px rgba(0,224,252,0.35));
        }
        .eyes { display:flex; gap:30px; }
        .eye { width:28px; height:28px; background:var(--mood-color); border-radius:50%; transition:all 0.3s; }
        .mouth-container { margin-top:14px; }
        .mouth-path { fill:none; stroke:var(--mood-color); stroke-width:5; stroke-linecap:round; transition:all 0.3s; }

        .face.smile .eye { border-radius:50% 50% 20% 20%; height:24px; }
        .face.bored .eye { height:7px; opacity:0.6; transform:translateY(5px); }
        .face.mad .eye { transform:rotate(15deg); background:#ff5e7a; }
        .face.mad .eye:last-child { transform:rotate(-15deg); }
        .face.surprised .eye { width:32px; height:32px; background:#ffe06b; }
        .face.glitch .eye { animation:glitch-eyes 0.12s infinite; background:#ff5e7a; }
        @keyframes glitch-eyes { 0%{transform:translate(0);} 50%{transform:translate(3px,-1px);} 100%{transform:translate(-2px,2px);} }
        .face.purring .eye { height:3px; background:#ff9f9f; transform:translateY(5px); }
        .face.love .eye { background:transparent; width:26px; height:26px; position:relative; }
        .face.love .eye::before, .face.love .eye::after {
            content:''; position:absolute; width:13px; height:20px; background:#ff5e7a;
            border-radius:50px 50px 0 0; box-shadow:0 0 10px rgba(255,94,122,0.6);
            top:50%; left:50%; transform-origin:bottom center;
        }
        .face.love .eye::before { transform:translate(-50%,0) rotate(-45deg); }
        .face.love .eye::after { transform:translate(-50%,0) rotate(45deg); }
        .face.love .mouth-container { margin-top:24px; }
        .face.cool .eye { background: #333; border: 3px solid var(--mood-color); border-radius: 5px; }
        .face.silly .eye { width: 20px; height: 28px; border-radius: 50% 50% 0 0; }
        .face.party .eye { background: linear-gradient(45deg, #ff007f, #ffe06b, #50e890, #4af0ff); background-size: 200% 200%; animation: party-rotate 1s linear infinite; }
        @keyframes party-rotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .speech-bubble {
            position:absolute; top:-55px; left:50%; transform:translateX(-50%);
            background:#fff; color:#222; padding:8px 16px; border-radius:20px;
            font-size:0.8rem; font-weight:700; white-space:nowrap;
            opacity:0; transition:opacity 0.2s; z-index:50; border:2px solid #333;
            font-family:'Comic Sans MS', cursive, sans-serif;
        }
        .speech-bubble.show { opacity:1; }
        .streak-counter, .tap-counter {
            position:fixed; left:50%; transform:translateX(-50%);
            background:#00e0fc; color:#030a0c; padding:6px 18px; border-radius:20px;
            font-weight:bold; font-size:0.85rem; z-index:200; opacity:0; transition:0.3s;
        }
        .streak-counter { top:20px; } .tap-counter { top:70px; }
        .streak-counter.show, .tap-counter.show { opacity:1; }
        .quick-toggles { position:fixed; top:20px; right:16px; display:flex; gap:10px; z-index:100; }
        .toggle-btn {
            width:38px; height:38px; border-radius:50%;
            background:rgba(255,255,255,0.1); backdrop-filter:blur(8px);
            border:1px solid rgba(255,255,255,0.2); cursor:pointer;
            font-size:1rem; display:flex; justify-content:center; align-items:center; color:#eee;
        }
        .toggle-btn.active { background:#00e0fc; color:#030a0c; }
    </style>
</head>
<body class="dark">
    <div class="boot-screen" id="bootScreen">HELLO</div>
    <div class="bg-grid"></div>
    <div class="flash-overlay" id="flashOverlay"></div>
    <div class="streak-counter" id="streakCounter">вЪ° 0</div>
    <div class="tap-counter" id="tapCounter">Taps: 0</div>
    <div class="toast" id="toast" style="position:fixed; bottom:30px; left:50%; background:#00e0fc; color:#030a0c; padding:10px 24px; border-radius:30px; font-weight:bold; z-index:200; opacity:0; transition:0.3s; transform:translateX(-50%); pointer-events:none;"></div>

    <div class="quick-toggles">
        <button class="toggle-btn" id="infoToggle" title="Time/Location/Weather">вДєпЄП</button>
        <button class="toggle-btn active" id="vibrateToggle" title="Vibration">рЯУ≥</button>
        <button class="toggle-btn active" id="soundToggle" title="Sound">рЯФК</button>
        <button class="toggle-btn active" id="darkToggle" title="Dark/Light">рЯМУ</button>
    </div>

    <div class="robot-wrapper" id="robotWrapper">
        <div class="speech-bubble" id="speechBubble"></div>
        <div class="antenna" id="antenna"></div>
        <div class="ear left" id="earLeft"></div>
        <div class="ear right" id="earRight"></div>
        <div class="head-casing" id="headCasing">
            <div class="face-screen">
                <div class="face" id="face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="mouth-container">
                        <svg width="80" height="36" viewBox="0 0 80 36"><path class="mouth-path" id="mouthPath" d="M 10 12 Q 40 36 70 12"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const moods = {
                smile:{c:'#50e890',e:'рЯШК',p:'Happy!',m:'M10 12 Q40 36 70 12'},
                bored:{c:'#88ccdd',e:'рЯШС',p:'Meh.',m:'M15 18 L65 18'},
                mad:{c:'#ff5e7a',e:'рЯШ†',p:'Grrr!',m:'M10 28 Q40 4 70 28'},
                thinking:{c:'#b983ff',e:'рЯ§Ф',p:'Hmm...',m:'M35 18 a6 6 0 1 1 0 6'},
                surprised:{c:'#ffe06b',e:'рЯШЃ',p:'Wow!',m:'M28 10 a12 12 0 1 1 0 20'},
                love:{c:'#ff5e7a',e:'вЭ§пЄП',p:'Love!',m:'M10 12 Q40 36 70 12'},
                wink:{c:'#ffe06b',e:'рЯШЙ',p:'Hey!',m:'M20 14 Q40 30 60 14'},
                confused:{c:'#88ccdd',e:'рЯШµ',p:'Huh?',m:'M15 14 Q25 6 35 14 T55 14 T65 14'},
                asleep:{c:'#667788',e:'рЯТ§',p:'Zzz...',m:'M32 18 a4 4 0 1 1 0 4'},
                glitch:{c:'#ff5e7a',e:'вЪ†пЄП',p:'ERROR!',m:'M15 14 L30 22 L20 22 L40 14 L35 22 L55 14'},
                busy:{c:'#4af0ff',e:'вЪЩпЄП',p:'Working...',m:'M20 16 L30 16 M40 16 L50 16 M60 16 L70 16'},
                purring:{c:'#ff9f9f',e:'рЯШї',p:'Purrr...',m:'M20 16 Q40 24 60 16'},
                dizzy:{c:'#ffe06b',e:'рЯ•і',p:'Whoa!',m:'M15 12 Q25 4 35 12 Q45 20 55 12 Q65 4 70 12'},
                frozen:{c:'#aaddff',e:'вЭДпЄП',p:'Freeze!',m:'M20 16 L60 16'},
                detective:{c:'#c0a000',e:'рЯХµпЄП',p:'Detective',m:'M15 10 Q40 24 65 10'},
                cool:{c:'#ffe06b',e:'рЯШО',p:'Cool!',m:'M15 18 L65 18'},
                silly:{c:'#ff5e7a',e:'рЯШЬ',p:'Silly!',m:'M20 16 Q40 30 60 16'},
                party:{c:'#ff007f',e:'рЯ•≥',p:'Party!',m:'M15 14 Q40 30 65 14'}
            };
            const greetings = ["Hello!","What's up?","Howdy!","Hi there!","Yo!","Hey!","Good to see you!","Nice day, huh?","Bleep bloop!"];

            let cur='smile', sound=true, vibrate=true, taps=0, streak=0, lastTap=0, autoTimer, destroyed=false, frozen=false, audioCtx;
            let dragging=false, startX, startY, initX, initY;
            const face=document.getElementById('face'), mouth=document.getElementById('mouthPath'),
                  streakEl=document.getElementById('streakCounter'), tapEl=document.getElementById('tapCounter'),
                  bubble=document.getElementById('speechBubble'), wrapper=document.getElementById('robotWrapper'),
                  toast=document.getElementById('toast'), headCasing=document.getElementById('headCasing'),
                  flashOverlay=document.getElementById('flashOverlay');

            setTimeout(()=>{ document.getElementById('bootScreen').style.display='none'; setMood('smile',true); },2000);

            function setMood(m,showBubble=false, customText=null){
                if(destroyed && m!=='rebooting') return;
                const d = moods[m] || {c:'#00e0fc',e:'рЯФД',p:'Rebooting...',m:'M28 14 a6 6 0 1 1 0 12'};
                document.documentElement.style.setProperty('--mood-color', d.c);
                document.documentElement.style.setProperty('--mood-glow', `rgba(${hexRgb(d.c)},0.6)`);
                face.className = 'face '+m;
                mouth.setAttribute('d', d.m);
                cur=m;
                if(vibrate && navigator.vibrate) navigator.vibrate(10);
                if(showBubble){ bubble.textContent=customText || `${d.e} ${d.p}`; bubble.classList.add('show'); setTimeout(()=>bubble.classList.remove('show'),2000); }
                if(m==='purring') playPurr(); else if(sound && m==='glitch') playGlitch(); else if(sound) playBeep(m);
            }
            function hexRgb(h){ return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }
            function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2000); }

            function playBeep(mood){
                if(!audioCtx) audioCtx=new AudioContext();
                const f={smile:500,bored:250,mad:350,thinking:420,surprised:750,love:520,wink:580,confused:380,asleep:180,busy:600,dizzy:700,cool:600,silly:400,party:800}[mood]||440;
                const o=audioCtx.createOscillator(), g=audioCtx.createGain();
                o.type='sine'; o.frequency.value=f*(0.9+Math.random()*0.2); g.gain.setValueAtTime(0.06,audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.1); o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.1);
            }
            function playPurr(){
                if(!audioCtx) audioCtx=new AudioContext();
                [25,35].forEach(f=>{ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.value=f; g.gain.setValueAtTime(0.05,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.5); o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+1.5); });
            }
            function playGlitch(){
                if(!audioCtx) audioCtx=new AudioContext();
                for(let i=0;i<5;i++){ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='square'; o.frequency.value=Math.random()*600+200; g.gain.setValueAtTime(0.03,audioCtx.currentTime+i*0.04); g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+i*0.04+0.04); o.connect(g).connect(audioCtx.destination); o.start(audioCtx.currentTime+i*0.04); o.stop(audioCtx.currentTime+i*0.04+0.04); }
            }

            function randomPlayful() {
                if (destroyed || frozen || dragging) return;
                const actions = ['greet', 'wave', 'spin', 'change'];
                const action = actions[Math.floor(Math.random() * actions.length)];
                if (action === 'greet') {
                    const greeting = greetings[Math.floor(Math.random() * greetings.length)];
                    setMood('smile', true, greeting);
                } else if (action === 'wave') {
                    headCasing.classList.add('shake');
                    setMood('wink', true, 'рЯСЛ');
                    setTimeout(() => headCasing.classList.remove('shake'), 400);
                } else if (action === 'spin') {
                    headCasing.classList.add('spin');
                    setMood('dizzy', true, 'Wheee!');
                    setTimeout(() => headCasing.classList.remove('spin'), 600);
                } else {
                    const playfulMoods = ['cool', 'silly', 'party', 'wink', 'love', 'surprised'];
                    const randomMood = playfulMoods[Math.floor(Math.random() * playfulMoods.length)];
                    setMood(randomMood, true);
                }
            }

            function resetAutoChange() {
                clearTimeout(autoTimer);
                if (destroyed) return;
                if (Math.random() < 0.4) randomPlayful();
                autoTimer = setTimeout(() => {
                    if (streak === 0 && !dragging) {
                        const keys = Object.keys(moods);
                        const m = keys[Math.floor(Math.random() * keys.length)];
                        if (m !== cur) setMood(m, true);
                    }
                    resetAutoChange();
                }, 6000 + Math.random() * 9000);
            }

            wrapper.addEventListener('click',(e)=>{
                if(destroyed||frozen) return;
                taps++; tapEl.textContent=`Taps: ${taps}`; tapEl.classList.add('show'); setTimeout(()=>tapEl.classList.remove('show'),2000);
                const now=Date.now(); streak=(now-lastTap<800)?streak+1:1; lastTap=now;
                streakEl.textContent=`вЪ° ${streak}`; streakEl.classList.add('show'); setTimeout(()=>streakEl.classList.remove('show'),1500);
                if(streak>=12) setMood('glitch',true);
                else if(streak>=8) setMood('mad',true);
                else if(streak>=5) setMood('confused',true);
                else { const keys=Object.keys(moods); setMood(keys[(keys.indexOf(cur)+1)%keys.length],true); }
                if(streak===15){ destroy(); return; }
                resetAutoChange();
            });

            function destroy(){
                destroyed=true;
                flashOverlay.classList.add('active'); setTimeout(()=>flashOverlay.classList.remove('active'),200);
                for(let i=0;i<8;i++){
                    const bolt=document.createElement('div'); bolt.className='bolt';
                    bolt.style.left=Math.random()*80+10+'%'; bolt.style.top=Math.random()*80+10+'%';
                    bolt.style.setProperty('--w',(Math.random()*100+50)+'px'); bolt.style.transform=`rotate(${Math.random()*360}deg)`;
                    document.body.appendChild(bolt); setTimeout(()=>bolt.remove(),500);
                }
                for(let i=0;i<20;i++){
                    const p=document.createElement('div');
                    p.style.cssText=`position:absolute;width:8px;height:8px;background:#ff5e7a;border-radius:50%;left:50%;top:50%;pointer-events:none;z-index:999;animation:particle-fly 0.8s ease-out forwards;`;
                    p.style.setProperty('--dx',(Math.random()-0.5)*150+'px'); p.style.setProperty('--dy',(Math.random()-0.5)*150+'px');
                    document.body.appendChild(p); setTimeout(()=>p.remove(),800);
                }
                if(vibrate&&navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
                wrapper.style.transition='transform 0.5s ease-in, opacity 0.5s';
                wrapper.style.transform='scale(0.08) rotate(25deg)'; wrapper.style.opacity='0';
                showToast('рЯТ• ELECTRIC OVERLOAD рЯТ•');
                setTimeout(()=>{
                    wrapper.style.transition='transform 0.6s ease-out, opacity 0.4s';
                    wrapper.style.transform='scale(1) rotate(0deg)'; wrapper.style.opacity='1';
                    setMood('rebooting',true);
                    setTimeout(()=>{ destroyed=false; streak=0; streakEl.textContent='вЪ° 0'; streakEl.classList.remove('show'); setMood('smile',true); resetAutoChange(); },1800);
                },1600);
            }

            wrapper.addEventListener('mousedown',(e)=>{ if(destroyed)return; e.preventDefault(); dragging=true; startX=e.clientX; startY=e.clientY; initX=wrapper.offsetLeft; initY=wrapper.offsetTop; });
            window.addEventListener('mousemove',(e)=>{ if(!dragging)return; wrapper.style.left=(initX+e.clientX-startX)+'px'; wrapper.style.top=(initY+e.clientY-startY)+'px'; });
            window.addEventListener('mouseup',()=>{ dragging=false; });
            wrapper.addEventListener('touchstart',(e)=>{ if(destroyed)return; e.preventDefault(); dragging=true; startX=e.touches[0].clientX; startY=e.touches[0].clientY; initX=wrapper.offsetLeft; initY=wrapper.offsetTop; });
            window.addEventListener('touchmove',(e)=>{ if(!dragging)return; wrapper.style.left=(initX+e.touches[0].clientX-startX)+'px'; wrapper.style.top=(initY+e.touches[0].clientY-startY)+'px'; });
            window.addEventListener('touchend',()=>{ dragging=false; });

            // вЬЕ FIXED: Location and Weather Info
            document.getElementById('infoToggle').addEventListener('click', async () => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const dateStr = now.toLocaleDateString([], {weekday:'long', day:'numeric', month:'long'});
                
                // Show time and date first
                bubble.textContent = `рЯХТ ${timeStr} | рЯУЕ ${dateStr}`;
                bubble.classList.add('show');
                
                // After 2 seconds, try to get location and weather
                setTimeout(async () => {
                    if (!('geolocation' in navigator)) {
                        bubble.textContent = 'рЯУН Geolocation not supported on this device';
                        bubble.classList.add('show');
                        setTimeout(() => bubble.classList.remove('show'), 3000);
                        return;
                    }
                    
                    bubble.textContent = 'рЯУН Getting location...';
                    bubble.classList.add('show');
                    
                    navigator.geolocation.getCurrentPosition(
                        async (pos) => {
                            const lat = pos.coords.latitude;
                            const lon = pos.coords.longitude;
                            
                            bubble.textContent = `рЯУН Found! Getting weather...`;
                            bubble.classList.add('show');
                            
                            try {
                                const response = await fetch(
                                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=celsius`
                                );
                                
                                if (!response.ok) throw new Error('Weather service unavailable');
                                
                                const data = await response.json();
                                const temp = Math.round(data.current_weather.temperature);
                                const code = data.current_weather.weathercode;
                                const weatherEmoji = getWeatherEmoji(code);
                                const condition = getWeatherCondition(code);
                                
                                bubble.textContent = `рЯУН ${lat.toFixed(1)}¬∞, ${lon.toFixed(1)}¬∞ | рЯМ°пЄП ${temp}¬∞C ${weatherEmoji} ${condition}`;
                                bubble.classList.add('show');
                                
                            } catch (err) {
                                bubble.textContent = `рЯУН ${lat.toFixed(1)}¬∞, ${lon.toFixed(1)}¬∞ | рЯМ°пЄП Weather unavailable`;
                                bubble.classList.add('show');
                            }
                            
                            setTimeout(() => bubble.classList.remove('show'), 6000);
                        },
                        (error) => {
                            let errorMsg = 'рЯУН Location unavailable';
                            if (error.code === error.PERMISSION_DENIED) {
                                errorMsg = 'рЯУН Location permission denied';
                            } else if (error.code === error.TIMEOUT) {
                                errorMsg = 'рЯУН Location request timed out';
                            } else if (error.code === error.POSITION_UNAVAILABLE) {
                                errorMsg = 'рЯУН Location not available';
                            }
                            bubble.textContent = errorMsg;
                            bubble.classList.add('show');
                            setTimeout(() => bubble.classList.remove('show'), 3000);
                        },
                        {
                            enableHighAccuracy: false,
                            timeout: 10000,
                            maximumAge: 300000
                        }
                    );
                }, 2500);
            });
            
            function getWeatherEmoji(code) {
                if (code === 0) return 'вШАпЄП';           // Clear sky
                if (code === 1) return 'рЯМ§пЄП';           // Mainly clear
                if (code === 2) return 'вЫЕ';           // Partly cloudy
                if (code === 3) return 'вШБпЄП';           // Overcast
                if (code >= 45 && code <= 48) return 'рЯМЂпЄП'; // Fog
                if (code >= 51 && code <= 55) return 'рЯМІпЄП'; // Drizzle
                if (code >= 56 && code <= 57) return 'рЯМ®пЄП'; // Freezing drizzle
                if (code >= 61 && code <= 65) return 'рЯМІпЄП'; // Rain
                if (code >= 66 && code <= 67) return 'рЯМ®пЄП'; // Freezing rain
                if (code >= 71 && code <= 77) return 'вЭДпЄП'; // Snow
                if (code >= 80 && code <= 82) return 'рЯМ¶пЄП'; // Rain showers
                if (code >= 85 && code <= 86) return 'рЯМ®пЄП'; // Snow showers
                if (code >= 95 && code <= 99) return 'вЫИпЄП'; // Thunderstorm
                return 'рЯМ°пЄП';
            }
            
            function getWeatherCondition(code) {
                if (code === 0) return 'Clear';
                if (code === 1) return 'Clear';
                if (code === 2) return 'Cloudy';
                if (code === 3) return 'Overcast';
                if (code >= 45 && code <= 48) return 'Fog';
                if (code >= 51 && code <= 55) return 'Drizzle';
                if (code >= 61 && code <= 65) return 'Rain';
                if (code >= 71 && code <= 77) return 'Snow';
                if (code >= 80 && code <= 82) return 'Showers';
                if (code >= 95 && code <= 99) return 'Storm';
                return '';
            }

            let antClicks=0; document.getElementById('antenna').addEventListener('click',(e)=>{ e.stopPropagation(); antClicks++; if(antClicks===3){ antClicks=0; headCasing.classList.add('shake'); setTimeout(()=>headCasing.classList.remove('shake'),400); } setTimeout(()=>antClicks=0,1200); });
            let earClicks=0; document.getElementById('earLeft').addEventListener('click',(e)=>{ e.stopPropagation(); earClicks++; if(earClicks===3){ earClicks=0; bubble.textContent='рЯР£ Easter egg!'; bubble.classList.add('show'); setTimeout(()=>bubble.classList.remove('show'),2000); } setTimeout(()=>earClicks=0,1200); });

            document.getElementById('soundToggle').addEventListener('click',function(){ sound=!sound; this.classList.toggle('active',sound); this.textContent=sound?'рЯФК':'рЯФЗ'; });
            document.getElementById('darkToggle').addEventListener('click',function(){ document.body.classList.toggle('dark'); this.classList.toggle('active'); });
            document.getElementById('vibrateToggle').addEventListener('click',function(){ vibrate=!vibrate; this.classList.toggle('active',vibrate); this.textContent=vibrate?'рЯУ≥':'рЯУі'; });

            setMood('smile',true);
            resetAutoChange();
        })();
    </script>
