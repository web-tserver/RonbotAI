<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
    <title>RonBot · Playground Fixed</title>
    <style>
        :root {
            --primary: #ff007f;
            --primary-glow: rgba(255, 0, 127, 0.6);
            --bg-light: #f0f2f5;
            --bg-dark: #0a0f16;
            --head-bg-light: #ffffff;
            --head-bg-dark: #1a1f2b;
            --screen-bg: #0d1117;
            --text-color: #333;
        }
        body.dark {
            --bg-light: var(--bg-dark);
            --head-bg-light: var(--head-bg-dark);
            --text-color: #eee;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-light);
            color: var(--text-color);
            min-height:100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .bg-grid {
            position:fixed; inset:0; z-index:0; pointer-events:none;
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ---- Robot wrapper (for drag) ---- */
        .robot-wrapper {
            position: relative;
            width: min(220px, 50vmin);
            height: min(220px, 50vmin);
            cursor: grab;
            transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.1, 1.8);
            z-index: 10;
        }
        .robot-wrapper:active { cursor: grabbing; }
        .robot-wrapper.dragging { transition: none; }

        /* ---- Head ---- */
        .robot-head {
            width: 100%; height: 100%;
            background: var(--head-bg-light);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), inset 0 8px 25px rgba(255,255,255,0.5), inset 0 -10px 20px rgba(0,0,0,0.05);
            position: relative;
            animation: float 6s ease-in-out infinite;
            transition: background 0.4s, box-shadow 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.dark .robot-head {
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 8px 25px rgba(255,255,255,0.05), inset 0 -10px 20px rgba(0,0,0,0.4);
        }
        @keyframes float {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-12px); }
        }

        /* Ears */
        .ear {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            width: 14px; height: 45%;
            background: #3a4a5a;
            border-radius: 7px;
            z-index: -1;
        }
        .ear.left { left: -8px; }
        .ear.right { right: -8px; }

        /* LED strips */
        .led-strip {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 5px; height: 50%; border-radius: 3px;
            background: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
            z-index: 20; opacity: 0.8;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .led-strip.left { left: 14px; }
        .led-strip.right { right: 14px; }

        /* Antenna */
        .antenna {
            position: absolute; top: -34px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 36px;
            background: #4a5a6a;
            border-radius: 4px 4px 0 0;
            z-index: 6;
        }
        .antenna::after {
            content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            width: 16px; height: 16px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 18px var(--primary), 0 0 35px var(--primary-glow);
            animation: antenna-pulse 2s infinite;
        }
        @keyframes antenna-pulse {
            0%,100%{ opacity: 0.8; transform: translateX(-50%) scale(1); }
            50%{ opacity: 1; transform: translateX(-50%) scale(1.25); }
        }

        /* Screen */
        .screen {
            width: 75%; height: 75%;
            background: var(--screen-bg);
            border-radius: 20px;
            border: 3px solid var(--primary);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 30px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* Face */
        .face-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            z-index: 2;
        }
        .eyes { display: flex; gap: 30px; }
        .eye {
            width: 18px; height: 18px;
            background: var(--primary);
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 0 15px var(--primary-glow);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pupil {
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 2px;
            position: absolute;
            transition: transform 0.05s linear;
            box-shadow: 0 0 8px rgba(255,255,255,0.9);
        }
        .mouth {
            height: 14px; width: 60px;
            border-bottom: 4px solid var(--primary);
            border-radius: 0 0 30px 30px;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            filter: drop-shadow(0 4px 10px var(--primary-glow));
        }

        /* Mood styles (fully present) */
        .face-container.smile .eye { border-radius:10px 10px 2px 2px; height:10px; width:18px; background:#50e890; }
        .face-container.smile .mouth { border-bottom-color:#50e890; }
        .face-container.bored .eye { height:5px; border-radius:2px; transform:translateY(6px); opacity:0.6; background:var(--primary); }
        .face-container.bored .mouth { width:20px; height:4px; background:var(--primary); border-radius:2px; border:none; opacity:0.6; }
        .face-container.mad .eye { height:6px; transform:rotate(20deg); background:#ff5e7a; }
        .face-container.mad .eye:last-child { transform:rotate(-20deg); }
        .face-container.mad .mouth { border-top:4px solid #ff5e7a; border-bottom:none; border-radius:30px 30px 0 0; }
        .face-container.thinking .eye:first-child { transform:translateX(-4px); }
        .face-container.thinking .eye:last-child { transform:translateX(4px); }
        .face-container.thinking .mouth { width:12px; height:12px; background:var(--primary); border-radius:50%; margin-left:20px; border:none; }
        .face-container.surprised .eye { width:18px; height:18px; border-radius:50%; background:#ffe06b; }
        .face-container.surprised .mouth { width:24px; height:24px; border:3px solid #ffe06b; border-radius:50%; border-bottom:none; }
        .face-container.love .eye { background:transparent; box-shadow:none; width:20px; height:18px; position:relative; }
        .face-container.love .eye::before, .face-container.love .eye::after {
            content:''; position:absolute; width:10px; height:16px; background:#ff5e7a; border-radius:50px 50px 0 0; box-shadow:0 0 12px rgba(255,94,122,0.6);
        }
        .face-container.love .eye::before { left:0; transform:rotate(-45deg); transform-origin:bottom left; }
        .face-container.love .eye::after { right:0; transform:rotate(45deg); transform-origin:bottom right; }
        .face-container.love .mouth { width:22px; height:12px; border-bottom:3px solid #ff5e7a; border-radius:0 0 20px 20px; }
        .face-container.wink .eye:first-child { height:4px; border-radius:2px; margin-top:8px; transform:none; background:var(--primary); }
        .face-container.wink .eye:last-child { border-radius:10px 10px 2px 2px; height:10px; width:18px; background:#ffe06b; }
        .face-container.wink .mouth { border-bottom-color:#ffe06b; }
        .face-container.confused .eye { width:16px; height:16px; border-radius:50%; background:transparent; border:2px solid var(--primary); box-shadow:0 0 8px var(--primary-glow); }
        .face-container.confused .eye::after { content:''; position:absolute; width:4px; height:4px; background:var(--primary); border-radius:50%; top:4px; left:4px; }
        .face-container.confused .mouth { width:22px; height:22px; border:2px solid var(--primary); border-radius:50%; border-top-color:transparent; border-left-color:transparent; transform:rotate(45deg); }
        .face-container.asleep .eye { height:3px; width:14px; border-radius:2px; opacity:0.5; margin-top:8px; background:#fff; }
        .face-container.asleep .mouth { width:16px; height:6px; background:#fff; opacity:0.5; border-radius:2px; border:none; }
        .face-container.glitch .eye { animation:glitch-eyes 0.15s infinite; background:#ff5e7a; }
        .face-container.glitch .mouth { background:#ff5e7a; height:4px; width:30px; border-radius:0; animation:glitch-mouth 0.1s infinite; border:none; }
        @keyframes glitch-eyes { 0%{transform:translate(0);}25%{transform:translate(-2px,1px);}50%{transform:translate(2px,-1px);}75%{transform:translate(-1px,-2px);}100%{transform:translate(1px,1px);} }
        @keyframes glitch-mouth { 0%{transform:scaleX(1);}50%{transform:scaleX(1.5);}100%{transform:scaleX(0.7);} }
        .face-container.charging .eye { animation:pulse-eye 1s infinite alternate; background:#50e890; }
        .face-container.charging .mouth { width:40px; height:8px; background:rgba(0,0,0,0.5); border:1px solid #50e890; border-radius:4px; position:relative; overflow:hidden; }
        .face-container.charging .mouth::after { content:''; position:absolute; left:0; top:0; height:100%; width:100%; background:#50e890; animation:progress 2s infinite ease-in-out; }
        @keyframes pulse-eye { 0%{opacity:0.4;transform:scale(0.8);}100%{opacity:1;transform:scale(1.1);} }
        @keyframes progress { 0%{transform:translateX(-100%);}100%{transform:translateX(0);} }
        .face-container.busy .eye { width:10px; height:10px; border-radius:50%; animation:spin-busy 0.6s linear infinite; background:var(--primary); }
        .face-container.busy .eye:first-child { animation-delay:0.1s; }
        .face-container.busy .mouth { width:36px; height:4px; background:var(--primary); border-radius:2px; animation:pulse-busy 1s ease-in-out infinite; border:none; }
        @keyframes spin-busy { 0%{transform:rotate(0) scale(1);}50%{transform:rotate(180deg) scale(0.7);}100%{transform:rotate(360deg) scale(1);} }
        @keyframes pulse-busy { 0%,100%{opacity:0.4;width:36px;}50%{opacity:1;width:50px;} }
        .face-container.purring .eye { height:2px; border-radius:2px; transform:translateY(6px); background:#ff9f9f; }
        .face-container.purring .mouth { width:18px; height:4px; background:#ff9f9f; border:none; opacity:0.7; }
        .face-container.dizzy .eye { width:10px; height:14px; border-radius:50%; animation:spin-eye 0.3s infinite; background:#ffe06b; }
        @keyframes spin-eye { 0%{transform:rotate(0deg);}100%{transform:rotate(360deg);} }

        /* Accessories */
        .accessory {
            position: absolute; pointer-events: none; z-index: 30;
            font-size: 2rem; text-shadow: 0 0 10px var(--primary-glow);
        }
        .accessory.hat { top: -40px; left: 50%; transform: translateX(-50%); }
        .accessory.glasses { top: 0px; left: 50%; transform: translateX(-50%); }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 20px);
            background: var(--primary); color: white; padding: 10px 24px; border-radius: 30px;
            font-size: 0.8rem; font-weight: bold; z-index: 200; opacity: 0; transition: 0.3s;
            pointer-events: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }

        /* Streak counter */
        .streak-counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px;
            font-weight: bold; z-index: 200; opacity: 0; transition: 0.3s;
        }
        .streak-counter.show { opacity: 1; }

        /* Toggle buttons */
        .quick-toggles {
            position: fixed; top: 20px; right: 20px; display: flex; gap: 12px; z-index: 100;
        }
        .toggle-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
            font-size: 1.1rem; display: flex; justify-content: center; align-items: center;
            color: #eee; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .toggle-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .toggle-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="dark">

<div class="bg-grid"></div>
<div class="toast" id="toast">👋 Hello!</div>
<div class="streak-counter" id="streakCounter">🔥 0</div>

<div class="quick-toggles">
    <button class="toggle-btn active" id="vibrateToggle" title="Vibration">📳</button>
    <button class="toggle-btn" id="soundToggle" title="Sound">🔇</button>
    <button class="toggle-btn active" id="darkToggle" title="Dark/Light">🌓</button>
</div>

<!-- Draggable robot wrapper -->
<div class="robot-wrapper" id="robotWrapper">
    <div class="robot-head" id="ronbot">
        <div class="antenna"></div>
        <div class="ear left"></div>
        <div class="ear right"></div>
        <div class="led-strip left"></div>
        <div class="led-strip right"></div>

        <div class="screen">
            <div class="face-container" id="face">
                <div class="eyes">
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <div class="mouth"></div>
            </div>
            <span class="accessory hat" id="hatAccessory" style="display:none;">🎩</span>
            <span class="accessory glasses" id="glassesAccessory" style="display:none;">👓</span>
        </div>
    </div>
</div>

<script>
    (() => {
        const moodDefs = {
            smile:    { color: '#50e890', freq: 440, emoji: '😊' },
            bored:    { color: '#4af0ff', freq: 220, emoji: '😑' },
            mad:      { color: '#ff5e7a', freq: 330, emoji: '😠' },
            thinking: { color: '#b983ff', freq: 400, emoji: '🤔' },
            surprised:{ color: '#ffe06b', freq: 800, emoji: '😮' },
            love:     { color: '#ff5e7a', freq: 520, emoji: '❤️' },
            wink:     { color: '#ffe06b', freq: 590, emoji: '😉' },
            confused: { color: '#4af0ff', freq: 370, emoji: '😵' },
            asleep:   { color: '#4af0ff', freq: 200, emoji: '💤' },
            glitch:   { color: '#ff5e7a', freq: 0, emoji: '⚠️' },
            charging: { color: '#50e890', freq: 500, emoji: '🔋' },
            busy:     { color: '#4af0ff', freq: 660, emoji: '⚙️' },
            purring:  { color: '#ff9f9f', freq: 300, emoji: '😻' },
            dizzy:    { color: '#ffe06b', freq: 700, emoji: '🥴' }
        };

        let currentMood = 'smile';
        let isLocked = false;
        let soundEnabled = false;
        let vibrationEnabled = true;
        let audioCtx;
        let streakCount = 0;
        let lastTapTime = 0;
        let longPressTimer;
        let accessories = { hat: false, glasses: false };

        // DOM refs
        const face = document.getElementById('face');
        const toast = document.getElementById('toast');
        const streakEl = document.getElementById('streakCounter');
        const hatEl = document.getElementById('hatAccessory');
        const glassesEl = document.getElementById('glassesAccessory');
        const pupils = document.querySelectorAll('.pupil');
        const robotWrapper = document.getElementById('robotWrapper');

        function applyMood(mood) {
            const def = moodDefs[mood];
            document.documentElement.style.setProperty('--primary', def.color);
            document.documentElement.style.setProperty('--primary-glow', `rgba(${hexToRgb(def.color)}, 0.6)`);
            face.className = 'face-container ' + mood;
            currentMood = mood;
            if (def.freq && soundEnabled) playSound(def.freq);
            if (vibrationEnabled && navigator.vibrate) navigator.vibrate(15);
            showToast(mood);
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            return `${r},${g},${b}`;
        }

        function playSound(freq) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        // ---- DRAG & THROW ----
        let isDragging = false;
        let startX, startY, offsetX = 0, offsetY = 0;

        robotWrapper.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('ear') || e.target.classList.contains('antenna')) return; // exclude ears/antenna
            isDragging = true;
            startX = e.clientX - offsetX;
            startY = e.clientY - offsetY;
            robotWrapper.classList.add('dragging');
            robotWrapper.style.animation = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            offsetX = e.clientX - startX;
            offsetY = e.clientY - startY;
            robotWrapper.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            robotWrapper.classList.remove('dragging');
            offsetX = 0; offsetY = 0;
            robotWrapper.style.transform = 'translate(0,0)';
            robotWrapper.style.animation = '';
        });

        // Touch drag
        robotWrapper.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('ear') || e.target.classList.contains('antenna')) return;
            e.preventDefault();
            const touch = e.touches[0];
            isDragging = true;
            startX = touch.clientX - offsetX;
            startY = touch.clientY - offsetY;
            robotWrapper.classList.add('dragging');
            robotWrapper.style.animation = 'none';
        });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            offsetX = touch.clientX - startX;
            offsetY = touch.clientY - startY;
            robotWrapper.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
        });
        window.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            robotWrapper.classList.remove('dragging');
            offsetX = 0; offsetY = 0;
            robotWrapper.style.transform = 'translate(0,0)';
            robotWrapper.style.animation = '';
        });

        // ---- CLICK TO CYCLE MOOD ----
        robotWrapper.addEventListener('click', (e) => {
            if (isDragging) return;
            const now = Date.now();
            if (now - lastTapTime < 800) {
                streakCount++;
                streakEl.textContent = `🔥 ${streakCount}`;
                streakEl.classList.add('show');
                setTimeout(() => streakEl.classList.remove('show'), 2000);
                if (streakCount === 10) { applyMood('surprised'); showToast('10 in a row!'); }
                else if (streakCount === 50) { applyMood('love'); showToast('50! Craaazy!'); }
            } else {
                streakCount = 0;
            }
            lastTapTime = now;
            const moods = Object.keys(moodDefs);
            const idx = moods.indexOf(currentMood);
            applyMood(moods[(idx + 1) % moods.length]);
        });

        // ---- LONG PRESS -> MAD ----
        robotWrapper.addEventListener('mousedown', (e) => {
            longPressTimer = setTimeout(() => {
                if (!isDragging) applyMood('mad');
            }, 1200);
        });
        robotWrapper.addEventListener('mouseup', () => clearTimeout(longPressTimer));
        robotWrapper.addEventListener('mouseleave', () => clearTimeout(longPressTimer));
        robotWrapper.addEventListener('touchstart', (e) => {
            longPressTimer = setTimeout(() => {
                if (!isDragging) applyMood('mad');
            }, 1200);
        });
        robotWrapper.addEventListener('touchend', () => clearTimeout(longPressTimer));
        robotWrapper.addEventListener('touchmove', () => clearTimeout(longPressTimer));

        // ---- DOUBLE CLICK LOCK ----
        robotWrapper.addEventListener('dblclick', (e) => {
            isLocked = !isLocked;
            robotWrapper.classList.toggle('locked', isLocked);
            showToast(isLocked ? '🔒 Locked' : '🔓 Unlocked');
        });

        // ---- PET ANTENNA ----
        document.querySelector('.antenna').addEventListener('click', (e) => {
            e.stopPropagation();
            applyMood('purring');
            setTimeout(() => applyMood('smile'), 2000);
            accessories.hat = !accessories.hat;
            hatEl.style.display = accessories.hat ? 'block' : 'none';
        });

        // ---- TICKLE LEFT EAR ----
        document.querySelector('.ear.left').addEventListener('click', (e) => {
            e.stopPropagation();
            applyMood('wink');
            showToast('Hehe!');
        });

        // ---- RIGHT EAR GLASSES ----
        document.querySelector('.ear.right').addEventListener('click', (e) => {
            e.stopPropagation();
            accessories.glasses = !accessories.glasses;
            glassesEl.style.display = accessories.glasses ? 'block' : 'none';
        });

        // ---- SHAKE DETECTION ----
        let lastShake = 0;
        window.addEventListener('devicemotion', (e) => {
            const acc = e.accelerationIncludingGravity;
            if (!acc) return;
            const mag = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
            if (mag > 25 && Date.now() - lastShake > 2000) {
                lastShake = Date.now();
                applyMood('dizzy');
                showToast('WHOA!');
                if (vibrationEnabled && navigator.vibrate) navigator.vibrate([100,50,100]);
            }
        });

        // ---- KEYBOARD SHORTCUTS ----
        document.addEventListener('keydown', (e) => {
            const moods = Object.keys(moodDefs);
            const idx = moods.indexOf(currentMood);
            if (e.key === 'ArrowRight') applyMood(moods[(idx+1)%moods.length]);
            else if (e.key === 'ArrowLeft') applyMood(moods[(idx-1+moods.length)%moods.length]);
            else if (e.key === ' ') { e.preventDefault(); applyMood(moods[Math.floor(Math.random()*moods.length)]); }
            // Konami
            window.konami = window.konami || [];
            window.konami.push(e.key);
            if (window.konami.length > 8) window.konami.shift();
            if (JSON.stringify(window.konami) === JSON.stringify(['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight'])) {
                applyMood('glitch');
                document.body.style.background = 'linear-gradient(45deg, #ff007f, #ffe06b, #50e890)';
                setTimeout(() => document.body.style.background = '', 3000);
            }
            // Self destruct
            if (e.key === 'Backspace' && e.ctrlKey) {
                let count = 5;
                showToast(`Self destruct in ${count}...`);
                const timer = setInterval(() => {
                    count--;
                    if (count === 0) {
                        clearInterval(timer);
                        applyMood('asleep');
                        robotWrapper.style.transform = 'scale(0)';
                        setTimeout(() => { robotWrapper.style.transform = 'scale(1)'; robotWrapper.style.animation = ''; }, 2000);
                    } else {
                        showToast(`Self destruct in ${count}...`);
                    }
                }, 1000);
            }
        });

        // ---- EYE TRACKING (simplified, no parallax to avoid conflicts) ----
        document.addEventListener('mousemove', (e) => {
            const rect = robotWrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width/2, centerY = rect.top + rect.height/2;
            const dx = (e.clientX - centerX) / (rect.width/2) * 4;
            const dy = (e.clientY - centerY) / (rect.height/2) * 4;
            pupils.forEach(p => p.style.transform = `translate(${dx}px, ${dy}px)`);
        });

        // ---- TOGGLES ----
        document.getElementById('soundToggle').addEventListener('click', function() {
            soundEnabled = !soundEnabled;
            this.classList.toggle('active', soundEnabled);
            this.textContent = soundEnabled ? '🔊' : '🔇';
        });
        document.getElementById('darkToggle').addEventListener('click', function() {
            document.body.classList.toggle('dark');
            this.classList.toggle('active');
        });
        document.getElementById('vibrateToggle').addEventListener('click', function() {
            vibrationEnabled = !vibrationEnabled;
            this.classList.toggle('active', vibrationEnabled);
            this.textContent = vibrationEnabled ? '📳' : '📴';
        });

        // Init
        applyMood('smile');
    })();
</script>
</body>
</html>
