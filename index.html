<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>RonBot · Fully Debugged 25-in-1</title>
    <style>
        :root {
            --mood-color: #00e0fc;
            --mood-glow: rgba(0,224,252,0.6);
            --bg-light: #f0f2f5;
            --bg-dark: #030a0c;
            --screen-bg: #030a0c;
            --casing-top: #f5f5f5;
            --casing-bottom: #b0b0b0;
        }
        body.dark { --bg-light: var(--bg-dark); --casing-top: #2a2a2a; --casing-bottom: #111; }
        body.neon { --casing-top: #ff00ff; --casing-bottom: #00ffff; --bg-light: #0a0a0a; --screen-bg: #0a0a0a; }
        body.pastel { --casing-top: #ffb3ba; --casing-bottom: #baffc9; --bg-light: #fff5f5; --screen-bg: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif; background: var(--bg-light); color: #eee;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; user-select: none; touch-action: none;
            position: fixed; inset: 0; -webkit-tap-highlight-color: transparent;
            transition: background 0.5s;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        /* Overlays */
        .boot-screen { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; color: #00e0fc; font-size: 2rem; font-weight: bold; letter-spacing: 4px; animation: bootFade 2s forwards; pointer-events: none; }
        @keyframes bootFade { 0% {opacity:1;} 80% {opacity:1;} 100% {opacity:0; display:none;} }
        .flash-overlay { position: fixed; inset: 0; z-index: 999; pointer-events: none; background: rgba(255,255,255,0.9); opacity: 0; transition: opacity 0.1s; }
        .flash-overlay.active { opacity: 1; }
        
        /* Particles & Bolts */
        .bolt { position: fixed; z-index: 1000; pointer-events: none; background: #fff; height: 3px; opacity: 0; box-shadow: 0 0 15px #4af0ff,0 0 30px #00e5ff; transform-origin: left center; animation: bolt-strike 0.5s ease-out forwards; }
        @keyframes bolt-strike { 0% {opacity:0;width:0;} 20% {opacity:1;width:var(--w);} 80% {opacity:1;} 100% {opacity:0;} }
        @keyframes particle-fly { 0% {opacity:1; transform:translate(0,0) scale(1);} 100% {opacity:0; transform:translate(var(--dx),var(--dy)) scale(0);} }

        /* Robot Construction */
        .robot-wrapper { position: fixed; width: min(200px,45vmin); height: min(200px,45vmin); cursor: grab; z-index: 10; filter: drop-shadow(0 0 15px var(--mood-glow)); }
        .robot-wrapper:active { cursor: grabbing; }
        
        .antenna { position: absolute; top: -34px; left: 50%; transform: translateX(-50%); width: 6px; height: 36px; background: #4a5a6a; border-radius: 4px 4px 0 0; z-index: 6; cursor: pointer; }
        .antenna::after { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 16px; height: 16px; background: var(--mood-color); border-radius: 50%; box-shadow: 0 0 18px var(--mood-color),0 0 35px var(--mood-glow); animation: antenna-pulse 2s infinite; }
        @keyframes antenna-pulse { 0%,100% {opacity:0.7; transform:translateX(-50%) scale(1);} 50% {opacity:1; transform:translateX(-50%) scale(1.25);} }
        
        .ear { position: absolute; top: 50%; transform: translateY(-50%); width: 14px; height: 45%; background: #3a4a5a; border-radius: 7px; z-index: -1; cursor: pointer; }
        .ear.left { left: -8px; } .ear.right { right: -8px; }
        
        .head-casing { width: 100%; height: 100%; background: linear-gradient(180deg,var(--casing-top) 0%,var(--casing-bottom) 100%); border: 6px solid #333; border-radius: 28px; display: flex; justify-content: center; align-items: center; box-shadow: 0 12px 30px rgba(0,0,0,0.25),0 0 20px var(--mood-glow); padding: 8px; box-sizing: border-box; transition: background 0.5s,border-color 0.5s; }
        body.dark .head-casing { border-color: #555; }
        .head-casing.shake { animation: shake 0.4s ease-in-out; }
        .head-casing.spin { animation: spin-head 0.6s ease-in-out; }
        @keyframes shake { 0%,100% {transform:translate(0,0);} 25% {transform:translate(-5px,2px);} 75% {transform:translate(5px,-2px);} }
        @keyframes spin-head { 0% {transform:rotate(0deg);} 100% {transform:rotate(360deg);} }

        .face-screen { width: 100%; height: 100%; background-color: var(--screen-bg); border-radius: 22px; position: relative; box-shadow: inset 0px 0px 30px rgba(0,0,0,1),inset -5px -7px 7px -2px rgba(255,255,255,0.25); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .face-screen.ink-mode { background-color: #010101; }
        .face-screen::after { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.2) 50%),linear-gradient(90deg,rgba(255,0,0,0.02),rgba(0,255,0,0.01),rgba(0,0,255,0.02)); background-size: 100% 3px,3px 100%; z-index: 10; pointer-events: none; animation: flicker 0.15s infinite; }
        @keyframes flicker { 0% {opacity:0.92;} 50% {opacity:0.82;} 100% {opacity:0.92;} }

        /* Face Elements */
        .face { display: flex; flex-direction: column; align-items: center; z-index: 5; filter: drop-shadow(0 0 6px var(--mood-color)) drop-shadow(0 0 16px rgba(0,224,252,0.35)); transition: filter 0.3s; width: 100%; height: 100%; justify-content: center; }
        .eyes { display: flex; gap: 30px; }
        .eye { width: 28px; height: 28px; background: var(--mood-color); border-radius: 50%; transition: all 0.3s; }
        .mouth-container { margin-top: 14px; }
        .mouth-path { fill: none; stroke: var(--mood-color); stroke-width: 5; stroke-linecap: round; transition: all 0.5s; }
        .accessory { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); font-size: 2.2rem; z-index: 30; pointer-events: none; }

        /* Standard Moods */
        .face.smile .eye { border-radius: 50% 50% 20% 20%; height: 24px; }
        .face.bored .eye { height: 7px; opacity: 0.6; transform: translateY(5px); }
        .face.mad .eye { transform: rotate(15deg); background: #ff5e7a; }
        .face.mad .eye:last-child { transform: rotate(-15deg); }
        .face.surprised .eye { width: 32px; height: 32px; background: #ffe06b; }
        .face.glitch .eye { animation: glitch-eyes 0.12s infinite; background: #ff5e7a; }
        @keyframes glitch-eyes { 0% {transform:translate(0);} 50% {transform:translate(3px,-1px);} 100% {transform:translate(-2px,2px);} }
        .face.purring .eye { height: 3px; background: #ff9f9f; transform: translateY(5px); }
        
        /* Advanced Moods */
        .face.love .eye { background: transparent; width: 26px; height: 26px; position: relative; }
        .face.love .eye::before,.face.love .eye::after { content: ''; position: absolute; width: 13px; height: 20px; background: #ff5e7a; border-radius: 50px 50px 0 0; box-shadow: 0 0 10px rgba(255,94,122,0.6); top: 50%; left: 50%; transform-origin: bottom center; }
        .face.love .eye::before { transform: translate(-50%,0) rotate(-45deg); }
        .face.love .eye::after { transform: translate(-50%,0) rotate(45deg); }
        .face.love .mouth-container { margin-top: 24px; }
        
        .face.cool .eye { background: #333; border: 3px solid var(--mood-color); border-radius: 5px; }
        .face.silly .eye { width: 20px; height: 28px; border-radius: 50% 50% 0 0; }
        .face.party .eye { background: linear-gradient(45deg,#ff007f,#ffe06b,#50e890,#4af0ff); background-size: 200% 200%; animation: party-rotate 1s linear infinite; }
        @keyframes party-rotate { 0% {background-position:0% 50%;} 50% {background-position:100% 50%;} 100% {background-position:0% 50%;} }
        .face.coffee .eye { background: #6f4e37; border-radius: 50% 50% 10% 10%; height: 22px; }
        .face.fortune .eye { background: #9b59b6; border-radius: 50%; animation: fortune-glow 0.5s infinite alternate; }
        @keyframes fortune-glow { 0% {box-shadow:0 0 10px #9b59b6;} 100% {box-shadow:0 0 25px #fff,0 0 40px #9b59b6;} }

        /* Hide default face if Custom Image is active */
        .face.custom .eyes, .face.custom .mouth-container { display: none; }

        /* UI overlays */
        .speech-bubble { position: absolute; top: -55px; left: 50%; transform: translateX(-50%); background: #fff; color: #222; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; white-space: nowrap; opacity: 0; transition: opacity 0.2s; z-index: 50; border: 2px solid #333; font-family: 'Comic Sans MS',cursive,sans-serif; pointer-events: none; }
        .speech-bubble.show { opacity: 1; }
        .speech-bubble::after { content:''; position:absolute; bottom:-12px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-top:12px solid #fff; }
        
        .streak-counter,.tap-counter,.bingo-card { position: fixed; left: 50%; transform: translateX(-50%); background: #00e0fc; color: #030a0c; padding: 6px 18px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; z-index: 200; opacity: 0; transition: 0.3s; pointer-events: none; }
        .streak-counter { top: 20px; } .tap-counter { top: 70px; } .bingo-card { top: 120px; background: #ffe06b; }
        .streak-counter.show,.tap-counter.show,.bingo-card.show { opacity: 1; }
        
        .quick-toggles { position: fixed; top: 20px; right: 16px; display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; max-width: 220px; justify-content: flex-end; }
        .toggle-btn { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); cursor: pointer; font-size: 0.95rem; display: flex; justify-content: center; align-items: center; color: #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .toggle-btn:active { transform: scale(0.9); }
        .toggle-btn.active { background: #00e0fc; color: #030a0c; border-color: #00e0fc; }

        /* Modals */
        .mini-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 99999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .mini-modal.open { opacity: 1; pointer-events: auto; }
        .mini-modal-content { background: #1a1f2b; color: white; padding: 25px; border-radius: 16px; text-align: center; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mini-modal button { margin: 8px 5px; padding: 10px 16px; background: #00e0fc; border: none; border-radius: 8px; cursor: pointer; color: #000; font-weight: bold; transition: 0.2s; }
        .mini-modal button:active { transform: scale(0.95); }
        
        #painterCanvas { background: #000; border: 3px solid #333; border-radius: 12px; cursor: crosshair; touch-action: none; margin: 15px 0; box-shadow: inset 0 0 15px rgba(0,224,252,0.3); }
        
        /* Memory Game Colors */
        .mem-btn { width: 60px; height: 60px; border-radius: 12px; display: inline-block; margin: 5px; opacity: 0.8; border: 3px solid transparent; cursor: pointer; }
        .mem-btn:active { opacity: 1; transform: scale(0.95); }
        #memRed { background: #ff5e7a; } #memGreen { background: #50e890; } 
        #memBlue { background: #00e0fc; } #memYellow { background: #ffe06b; }
    </style>
</head>
<body class="dark">
    <div class="boot-screen" id="bootScreen">HELLO</div>
    <div class="bg-grid"></div>
    <div class="flash-overlay" id="flashOverlay"></div>
    <div class="streak-counter" id="streakCounter">⚡ 0</div>
    <div class="tap-counter" id="tapCounter">Taps: 0</div>
    <div class="bingo-card" id="bingoCard"></div>
    <div class="toast" id="toast" style="position:fixed;bottom:30px;left:50%;background:#00e0fc;color:#030a0c;padding:10px 24px;border-radius:30px;font-weight:bold;z-index:200;opacity:0;transition:0.3s;transform:translateX(-50%);pointer-events:none;"></div>

    <div class="mini-modal" id="painterModal">
        <div class="mini-modal-content">
            <h3>Mood Painter 🎨</h3>
            <canvas id="painterCanvas" width="160" height="120"></canvas><br>
            <button id="savePainterBtn">Save & Apply</button>
            <button id="clearPainterBtn">Clear</button>
            <button id="closePainterBtn">Close</button>
        </div>
    </div>
    
    <div class="mini-modal" id="diaryModal">
        <div class="mini-modal-content">
            <h3>Mood Diary 📖</h3>
            <div id="diaryContent" style="max-height:200px; overflow-y:auto; font-size:0.9rem; margin:15px 0; text-align:left; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;"></div>
            <button id="closeDiaryBtn">Close</button>
        </div>
    </div>
    
    <div class="mini-modal" id="memoryModal">
        <div class="mini-modal-content">
            <h3>Memory Game 🧠</h3>
            <p id="memoryStatus" style="margin: 10px 0; font-weight: bold; color: #ffe06b;">Press Start to play!</p>
            <div id="memPad" style="pointer-events:none; opacity:0.5; margin: 15px 0;">
                <div class="mem-btn" id="memRed" data-color="mad"></div>
                <div class="mem-btn" id="memGreen" data-color="smile"></div><br>
                <div class="mem-btn" id="memBlue" data-color="bored"></div>
                <div class="mem-btn" id="memYellow" data-color="surprised"></div>
            </div>
            <button id="startMemoryBtn">Start Game</button>
            <button id="closeMemoryBtn">Close</button>
        </div>
    </div>

    <div class="quick-toggles">
        <button class="toggle-btn" id="infoToggle" title="Time/Location/Weather">ℹ️</button>
        <button class="toggle-btn" id="painterToggle" title="Mood Painter">🎨</button>
        <button class="toggle-btn" id="memoryToggle" title="Memory Game">🧠</button>
        <button class="toggle-btn" id="diaryToggle" title="Mood Diary">📖</button>
        <button class="toggle-btn" id="themeToggle" title="Theme">🌈</button>
        <button class="toggle-btn active" id="vibrateToggle" title="Vibration">📳</button>
        <button class="toggle-btn active" id="soundToggle" title="Sound">🎵</button>
        <button class="toggle-btn" id="micToggle" title="React to Microphone">🎤</button>
    </div>

    <div class="robot-wrapper" id="robotWrapper">
        <div class="speech-bubble" id="speechBubble"></div>
        <span class="accessory" id="accessoryEl"></span>
        <div class="antenna" id="antenna"></div>
        <div class="ear left" id="earLeft"></div>
        <div class="ear right" id="earRight"></div>
        <div class="head-casing" id="headCasing">
            <div class="face-screen" id="faceScreen">
                <div class="face" id="face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="mouth-container">
                        <svg width="80" height="36" viewBox="0 0 80 36"><path class="mouth-path" id="mouthPath" d="M 10 12 Q 40 36 70 12"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            // --- Configuration & State ---
            const moods = {
                smile: {c:'#50e890', e:'😊', p:'Happy!', m:'M 10 12 Q 40 36 70 12'},
                bored: {c:'#00e0fc', e:'😑', p:'Meh.', m:'M 15 18 L 65 18'},
                mad: {c:'#ff5e7a', e:'😠', p:'Grrr!', m:'M 10 28 Q 40 4 70 28'},
                thinking: {c:'#b983ff', e:'🤔', p:'Hmm...', m:'M 35 18 a 6 6 0 1 1 0 6'},
                surprised: {c:'#ffe06b', e:'😮', p:'Wow!', m:'M 28 10 a 12 12 0 1 1 0 20'},
                love: {c:'#ff5e7a', e:'❤️', p:'Love!', m:'M 10 12 Q 40 36 70 12'},
                wink: {c:'#ffe06b', e:'😉', p:'Hey!', m:'M 20 14 Q 40 30 60 14'},
                confused: {c:'#88ccdd', e:'😵', p:'Huh?', m:'M 15 14 Q 25 6 35 14 T 55 14 T 65 14'},
                asleep: {c:'#667788', e:'💤', p:'Zzz...', m:'M 32 18 a 4 4 0 1 1 0 4'},
                glitch: {c:'#ff5e7a', e:'⚠️', p:'ERROR!', m:'M 15 14 L 30 22 L 20 22 L 40 14 L 35 22 L 55 14'},
                busy: {c:'#4af0ff', e:'⚙️', p:'Working...', m:'M 20 16 L 30 16 M 40 16 L 50 16 M 60 16 L 70 16'},
                purring: {c:'#ff9f9f', e:'😻', p:'Purrr...', m:'M 20 16 Q 40 24 60 16'},
                dizzy: {c:'#ffe06b', e:'🥴', p:'Whoa!', m:'M 15 12 Q 25 4 35 12 Q 45 20 55 12 Q 65 4 70 12'},
                cool: {c:'#00e0fc', e:'😎', p:'Cool!', m:'M 15 18 L 65 18'},
                silly: {c:'#ff5e7a', e:'😜', p:'Silly!', m:'M 20 16 Q 40 30 60 16'},
                party: {c:'#ff007f', e:'🥳', p:'Party!', m:'M 15 14 Q 40 30 65 14'},
                coffee: {c:'#6f4e37', e:'☕', p:'Coffee!', m:'M 15 18 L 65 18'},
                fortune: {c:'#9b59b6', e:'🔮', p:'Mystical...', m:'M 28 14 a 6 6 0 1 1 0 12'},
                custom: {c:'#ffffff', e:'✨', p:'My Art!', m:'M 10 12 Q 40 36 70 12'}
            };
            
            const greetings = ["Hello!", "What's up?", "Howdy!", "Hi there!", "Yo!", "Hey!"];
            const accessories = ['', '🎩', '👓', '👒', '🤠', '🎀', '👑'];
            const themes = ['dark', 'neon', 'pastel'];
            const fortunes = ["Yes!", "No.", "Maybe...", "Ask again!", "Definitely!", "Doubtful."];
            
            let cur = 'smile', sound = true, vibrate = true, taps = 0, streak = 0, lastTap = 0;
            let autoTimer, destroyed = false, audioCtx;
            let dragging = false, hasDragged = false, startX, startY, initX, initY;
            let accessoryIdx = 0, themeIdx = 0, inkMode = false;
            let speedTapActive = false, speedTapScore = 0, speedTapTarget = null, speedTapTimer;
            let memorySeq = [], memoryPlayerIdx = 0, memoryPlaying = false;
            let composerSeq = [], composerPlaying = false;
            let bingoSeq = [], bingoIdx = 0;
            let beatStream = null, beatActive = false, beatInterval;
            let clickCount = 0, clickTimer;
            
            const userName = localStorage.getItem('ronbot-name') || '';
            const diary = JSON.parse(localStorage.getItem('mood-diary') || '[]');

            // --- DOM Elements ---
            const els = {
                face: document.getElementById('face'), mouth: document.getElementById('mouthPath'),
                streak: document.getElementById('streakCounter'), tap: document.getElementById('tapCounter'),
                bubble: document.getElementById('speechBubble'), wrapper: document.getElementById('robotWrapper'),
                toast: document.getElementById('toast'), headCasing: document.getElementById('headCasing'),
                flash: document.getElementById('flashOverlay'), accessory: document.getElementById('accessoryEl'),
                faceScreen: document.getElementById('faceScreen'), bingo: document.getElementById('bingoCard')
            };

            // --- Init & Centering ---
            function centerRobot() {
                els.wrapper.style.left = `calc(50vw - ${els.wrapper.offsetWidth/2}px)`;
                els.wrapper.style.top = `calc(50vh - ${els.wrapper.offsetHeight/2}px)`;
            }
            window.addEventListener('resize', centerRobot);
            centerRobot();

            setTimeout(() => { 
                document.getElementById('bootScreen').style.display = 'none'; 
                setMood('smile', true); 
                if(userName) setTimeout(() => displayBubble(`Welcome back, ${userName}!`), 3000); 
            }, 2000);

            // --- Core Utilities ---
            function hexRgb(h) { return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }
            function displayBubble(t) { els.bubble.textContent = t; els.bubble.classList.add('show'); setTimeout(() => els.bubble.classList.remove('show'), 2000); }
            function showToast(t) { els.toast.textContent = t; els.toast.classList.add('show'); setTimeout(() => els.toast.classList.remove('show'), 2000); }

            function initAudio() {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
            }

            // --- Mood Engine ---
            function setMood(m, shouldShowBubble = false, customText = null) {
                if(destroyed && m !== 'rebooting') return;
                const d = moods[m] || {c:'#00e0fc', e:'🔄', p:'Rebooting...', m:'M 28 14 a 6 6 0 1 1 0 12'};
                
                document.documentElement.style.setProperty('--mood-color', d.c);
                document.documentElement.style.setProperty('--mood-glow', `rgba(${hexRgb(d.c)}, 0.6)`);
                
                els.face.className = 'face ' + m; 
                els.mouth.setAttribute('d', d.m); 
                cur = m;

                if (m !== 'custom') els.face.style.backgroundImage = 'none'; // Clear drawing

                if(vibrate && navigator.vibrate) navigator.vibrate(10);
                if(shouldShowBubble) displayBubble(customText || `${d.e} ${d.p}`);
                
                if(m === 'purring') playPurr(); 
                else if(sound && m === 'glitch') playGlitch(); 
                else if(sound && m !== 'rebooting') playBeep(m);
                
                // Save to diary
                diary.push({mood: m, time: Date.now()}); 
                if(diary.length > 50) diary.shift(); 
                localStorage.setItem('mood-diary', JSON.stringify(diary));
                
                // Speed Tap Logic
                if(speedTapActive && m === speedTapTarget) {
                    speedTapScore++; showToast(`⭐ ${speedTapScore}`); speedTapTarget = null; clearTimeout(speedTapTimer);
                    if(speedTapScore >= 10) { speedTapActive = false; showToast('🏆 Speed Champ!'); } 
                    else scheduleSpeedTap();
                }
                
                // Bingo Logic
                if(bingoSeq.length > 0 && m === bingoSeq[bingoIdx]) {
                    bingoIdx++; els.bingo.textContent = `Bingo: ${bingoIdx}/${bingoSeq.length}`; els.bingo.classList.add('show');
                    if(bingoIdx >= bingoSeq.length) { showToast('🎉 BINGO!'); bingoSeq = []; bingoIdx = 0; els.bingo.classList.remove('show'); }
                }
            }

            // --- Audio Synthesizers ---
            function playBeep(mood) {
                initAudio();
                const f = {smile:500, bored:250, mad:350, thinking:420, surprised:750, love:520, wink:580, confused:380, asleep:180, busy:600, dizzy:700, cool:600, silly:400, party:800, coffee:300, fortune:660}[mood] || 440;
                const o = audioCtx.createOscillator(), g = audioCtx.createGain(); 
                o.type = 'sine'; o.frequency.value = f * (0.9 + Math.random() * 0.2);
                g.gain.setValueAtTime(0.06, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
                o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
                if (composerSeq.length < 20) composerSeq.push(f);
            }
            
            function playPurr() {
                initAudio();
                [25, 35].forEach(f => { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5); o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 1.5); });
            }
            
            function playGlitch() {
                initAudio();
                for(let i=0; i<5; i++) { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square'; o.frequency.value = Math.random() * 600 + 200; g.gain.setValueAtTime(0.03, audioCtx.currentTime + i * 0.04); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + i * 0.04 + 0.04); o.connect(g).connect(audioCtx.destination); o.start(audioCtx.currentTime + i * 0.04); o.stop(audioCtx.currentTime + i * 0.04 + 0.04); }
            }

            // --- Ambient Logic ---
            function randomPlayful() {
                if(destroyed || dragging) return;
                const a = ['greet', 'wave', 'spin', 'change']; const ac = a[Math.floor(Math.random() * a.length)];
                if(ac === 'greet') setMood('smile', true, greetings[Math.floor(Math.random() * greetings.length)]);
                else if(ac === 'wave') { els.headCasing.classList.add('shake'); setMood('wink', true, '👋'); setTimeout(() => els.headCasing.classList.remove('shake'), 400); }
                else if(ac === 'spin') { els.headCasing.classList.add('spin'); setMood('dizzy', true, 'Wheee!'); setTimeout(() => els.headCasing.classList.remove('spin'), 600); }
                else { const pm = ['cool', 'silly', 'party', 'wink', 'love', 'surprised']; setMood(pm[Math.floor(Math.random() * pm.length)], true); }
            }

            function resetAutoChange() {
                clearTimeout(autoTimer); if(destroyed) return;
                if(Math.random() < 0.3) randomPlayful();
                autoTimer = setTimeout(() => {
                    if(streak === 0 && !dragging && !speedTapActive && !memoryPlaying) {
                        const k = Object.keys(moods); const m = k[Math.floor(Math.random() * k.length)];
                        if(m !== cur) setMood(m, true);
                    }
                    resetAutoChange();
                }, 7000 + Math.random() * 8000);
            }

            function scheduleSpeedTap() {
                if(!speedTapActive) return;
                speedTapTimer = setTimeout(() => {
                    const k = ['smile','mad','love','surprised','bored'];
                    speedTapTarget = k[Math.floor(Math.random() * k.length)];
                    displayBubble(`Tap: ${moods[speedTapTarget].e}`);
                    scheduleSpeedTap();
                }, 1500 + Math.random() * 1000);
            }

            // --- Memory Game Logic ---
            const memStatus = document.getElementById('memoryStatus');
            const memPad = document.getElementById('memPad');
            
            function startMemoryGame() {
                memorySeq = []; memoryPlayerIdx = 0; memoryPlaying = true;
                const colors = ['mad', 'smile', 'bored', 'surprised'];
                for(let i=0; i<4; i++) memorySeq.push(colors[Math.floor(Math.random() * 4)]);
                
                memStatus.textContent = 'Watch the robot...';
                memPad.style.pointerEvents = 'none'; memPad.style.opacity = '0.5';
                
                let i = 0;
                const iv = setInterval(() => {
                    if(i >= memorySeq.length) {
                        clearInterval(iv);
                        memStatus.textContent = 'Your turn! Tap the colors.';
                        memPad.style.pointerEvents = 'auto'; memPad.style.opacity = '1';
                        setMood('smile'); // Reset face to neutral
                        return;
                    }
                    setMood(memorySeq[i], false);
                    initAudio(); // play sound
                    i++;
                }, 800);
            }

            document.querySelectorAll('.mem-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if(!memoryPlaying) return;
                    const tappedColor = e.target.getAttribute('data-color');
                    setMood(tappedColor); // Flash the face
                    
                    if(tappedColor === memorySeq[memoryPlayerIdx]) {
                        memoryPlayerIdx++;
                        if(memoryPlayerIdx >= memorySeq.length) {
                            showToast('✅ You Win!'); memStatus.textContent = 'Winner! Press Start to play again.';
                            memoryPlaying = false; memPad.style.pointerEvents = 'none'; memPad.style.opacity = '0.5';
                        }
                    } else {
                        showToast('❌ Wrong!'); setMood('glitch', true);
                        memStatus.textContent = 'Game Over. Press Start to try again.';
                        memoryPlaying = false; memPad.style.pointerEvents = 'none'; memPad.style.opacity = '0.5';
                    }
                });
            });

            // --- Interactions (Drag & Click) ---
            function getCoords(e) { return e.touches ? e.touches[0] : e; }

            els.wrapper.addEventListener('mousedown', (e) => { if(destroyed) return; e.preventDefault(); dragging = true; hasDragged = false; const c = getCoords(e); startX = c.clientX; startY = c.clientY; initX = els.wrapper.offsetLeft; initY = els.wrapper.offsetTop; });
            window.addEventListener('mousemove', (e) => { if(!dragging) return; const c = getCoords(e); if(Math.abs(c.clientX - startX) > 5 || Math.abs(c.clientY - startY) > 5) hasDragged = true; els.wrapper.style.left = (initX + c.clientX - startX) + 'px'; els.wrapper.style.top = (initY + c.clientY - startY) + 'px'; });
            window.addEventListener('mouseup', () => { dragging = false; });
            
            els.wrapper.addEventListener('touchstart', (e) => { if(destroyed) return; dragging = true; hasDragged = false; const c = getCoords(e); startX = c.clientX; startY = c.clientY; initX = els.wrapper.offsetLeft; initY = els.wrapper.offsetTop; }, {passive: true});
            window.addEventListener('touchmove', (e) => { if(!dragging) return; const c = getCoords(e); if(Math.abs(c.clientX - startX) > 5 || Math.abs(c.clientY - startY) > 5) hasDragged = true; els.wrapper.style.left = (initX + c.clientX - startX) + 'px'; els.wrapper.style.top = (initY + c.clientY - startY) + 'px'; }, {passive: true});
            window.addEventListener('touchend', () => { dragging = false; });

            // Core Click
            els.wrapper.addEventListener('click', (e) => {
                if(destroyed || hasDragged) return; // Prevent tap if dragged
                initAudio();
                
                clickCount++; clearTimeout(clickTimer); 
                clickTimer = setTimeout(() => { clickCount = 0; }, 400);
                
                if(clickCount === 3) { 
                    clickCount = 0; clearTimeout(clickTimer); speedTapActive = !speedTapActive; speedTapScore = 0; 
                    if(speedTapActive) { showToast('Speed Tap ON!'); scheduleSpeedTap(); } 
                    else { clearTimeout(speedTapTimer); showToast('Speed Tap OFF'); } 
                    return; 
                }
                
                taps++; els.tap.textContent = `Taps: ${taps}`; els.tap.classList.add('show'); setTimeout(() => els.tap.classList.remove('show'), 2000);
                const now = Date.now(); streak = (now - lastTap < 800) ? streak + 1 : 1; lastTap = now;
                els.streak.textContent = `⚡ ${streak}`; els.streak.classList.add('show'); setTimeout(() => els.streak.classList.remove('show'), 1500);
                
                if(streak >= 12) setMood('glitch', true); 
                else if(streak >= 8) setMood('mad', true); 
                else if(streak >= 5) setMood('confused', true);
                else { const k = Object.keys(moods).filter(m => m !== 'custom'); setMood(k[(k.indexOf(cur) + 1) % k.length], true); }
                
                if(streak === 15) { destroy(); return; } 
                resetAutoChange();
            });

            // Double-click fortune
            els.wrapper.addEventListener('dblclick', (e) => { e.stopPropagation(); if(hasDragged)return; const r = Math.floor(Math.random() * fortunes.length); setMood('fortune', true, fortunes[r]); clickCount = 0; });

            function destroy() {
                destroyed = true; els.flash.classList.add('active'); setTimeout(() => els.flash.classList.remove('active'), 200);
                for(let i=0; i<8; i++) { const b = document.createElement('div'); b.className = 'bolt'; b.style.left = Math.random() * 80 + 10 + '%'; b.style.top = Math.random() * 80 + 10 + '%'; b.style.setProperty('--w', (Math.random() * 100 + 50) + 'px'); b.style.transform = `rotate(${Math.random() * 360}deg)`; document.body.appendChild(b); setTimeout(() => b.remove(), 500); }
                for(let i=0; i<20; i++) { const p = document.createElement('div'); p.style.cssText = `position:absolute;width:8px;height:8px;background:#ff5e7a;border-radius:50%;left:50%;top:50%;pointer-events:none;z-index:999;animation:particle-fly 0.8s ease-out forwards;`; p.style.setProperty('--dx', (Math.random() - 0.5) * 150 + 'px'); p.style.setProperty('--dy', (Math.random() - 0.5) * 150 + 'px'); document.body.appendChild(p); setTimeout(() => p.remove(), 800); }
                
                if(vibrate && navigator.vibrate) navigator.vibrate([100,50,100,50,200]); 
                els.wrapper.style.transition = 'transform 0.5s ease-in, opacity 0.5s'; els.wrapper.style.transform = 'scale(0.08) rotate(25deg)'; els.wrapper.style.opacity = '0'; showToast('💥 OVERLOAD 💥');
                
                setTimeout(() => { els.wrapper.style.transition = 'transform 0.6s ease-out, opacity 0.4s'; els.wrapper.style.transform = 'scale(1) rotate(0deg)'; els.wrapper.style.opacity = '1'; setMood('rebooting', true); setTimeout(() => { destroyed = false; streak = 0; els.streak.textContent = '⚡ 0'; els.streak.classList.remove('show'); setMood('smile', true); centerRobot(); resetAutoChange(); }, 1800); }, 1600);
            }

            // --- Easter Eggs (Ears & Antenna) ---
            document.getElementById('earRight').addEventListener('click', (e) => { e.stopPropagation(); accessoryIdx = (accessoryIdx + 1) % accessories.length; els.accessory.textContent = accessories[accessoryIdx]; });
            document.getElementById('earLeft').addEventListener('click', (e) => { e.stopPropagation(); inkMode = !inkMode; els.faceScreen.classList.toggle('ink-mode', inkMode); });
            document.getElementById('antenna').addEventListener('click', (e) => { 
                e.stopPropagation(); initAudio();
                if(!composerPlaying && composerSeq.length > 0) {
                    composerPlaying = true; let i = 0; showToast('Playing recorded beeps!');
                    const iv = setInterval(() => {
                        if(!composerPlaying || i >= composerSeq.length) { clearInterval(iv); composerPlaying = false; return; }
                        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'sine'; o.frequency.value = composerSeq[i]; g.gain.setValueAtTime(0.08, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2); o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.2); i++;
                    }, 250);
                } else { composerPlaying = false; composerSeq = []; showToast('Melody cleared'); }
            });

            // --- Info API ---
            document.getElementById('infoToggle').addEventListener('click', async () => {
                const now = new Date(); displayBubble(`🕒 ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`);
                setTimeout(async () => {
                    if('geolocation' in navigator) {
                        navigator.geolocation.getCurrentPosition(async pos => {
                            try { const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`); const d = await r.json(); displayBubble(`🌡️ ${Math.round(d.current_weather.temperature)}°C`); } 
                            catch { displayBubble('Weather unavailable'); }
                        }, () => { displayBubble('Location denied'); }, {timeout: 4000});
                    }
                }, 2500);
            });

            // --- Painter Canvas Logic ---
            const canvas = document.getElementById('painterCanvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            
            // Setup Canvas
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#00e0fc'; ctx.lineWidth = 4; ctx.lineCap = 'round';

            const startDraw = (e) => { isDrawing = true; draw(e); };
            const stopDraw = () => { isDrawing = false; ctx.beginPath(); };
            const draw = (e) => {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            };

            canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', stopDraw); canvas.addEventListener('mouseleave', stopDraw);
            canvas.addEventListener('touchstart', startDraw, {passive: true}); canvas.addEventListener('touchmove', draw, {passive: true}); canvas.addEventListener('touchend', stopDraw);

            document.getElementById('painterToggle').addEventListener('click', () => document.getElementById('painterModal').classList.toggle('open'));
            document.getElementById('closePainterBtn').addEventListener('click', () => document.getElementById('painterModal').classList.remove('open'));
            document.getElementById('clearPainterBtn').addEventListener('click', () => { ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); });
            document.getElementById('savePainterBtn').addEventListener('click', () => { 
                const dataURL = canvas.toDataURL();
                setMood('custom', true);
                els.face.style.backgroundImage = `url(${dataURL})`;
                els.face.style.backgroundSize = 'contain';
                els.face.style.backgroundRepeat = 'no-repeat';
                els.face.style.backgroundPosition = 'center';
                document.getElementById('painterModal').classList.remove('open'); 
                showToast('Masterpiece Applied!');
            });

            // --- Other Modals ---
            document.getElementById('diaryToggle').addEventListener('click', () => { document.getElementById('diaryModal').classList.toggle('open'); const d = JSON.parse(localStorage.getItem('mood-diary') || '[]').slice(-15).reverse(); document.getElementById('diaryContent').innerHTML = d.map(e => `• ${new Date(e.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}: ${moods[e.mood]?.e || ''} ${e.mood}`).join('<br>') || 'No entries yet'; });
            document.getElementById('closeDiaryBtn').addEventListener('click', () => document.getElementById('diaryModal').classList.remove('open'));
            
            document.getElementById('memoryToggle').addEventListener('click', () => document.getElementById('memoryModal').classList.toggle('open'));
            document.getElementById('startMemoryBtn').addEventListener('click', startMemoryGame);
            document.getElementById('closeMemoryBtn').addEventListener('click', () => { document.getElementById('memoryModal').classList.remove('open'); memoryPlaying = false; setMood('smile'); });

            // --- Theme & Extras ---
            document.getElementById('themeToggle').addEventListener('click', () => { themeIdx = (themeIdx + 1) % themes.length; document.body.className = themes[themeIdx]; showToast(`${themes[themeIdx]} theme`); });
            
            setTimeout(() => { const d = new Date(), m = d.getMonth() + 1, day = d.getDate(); if(m === 10 && day === 31) displayBubble('🎃 Happy Halloween!'); if(m === 12 && day === 25) displayBubble('🎄 Merry Christmas!'); }, 4000);
            
            if(!userName) { setTimeout(() => { const n = prompt('What should I call you?'); if(n) { localStorage.setItem('ronbot-name', n); displayBubble(`Nice to meet you, ${n}!`); } }, 5000); }
            
            document.addEventListener('keydown', (e) => { if(e.key === 'b' && e.ctrlKey) { bingoSeq = Object.keys(moods).sort(() => 0.5 - Math.random()).slice(0, 5); bingoIdx = 0; els.bingo.textContent = `Bingo: 0/5`; els.bingo.classList.add('show'); showToast('Bingo mode started!'); } });

            // --- Mic Beat Sync ---
            async function startBeatSync() {
                if(beatActive) return; beatActive = true;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); beatStream = stream;
                    const actx = new AudioContext(); const src = actx.createMediaStreamSource(stream); const analyser = actx.createAnalyser(); src.connect(analyser);
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    beatInterval = setInterval(() => {
                        analyser.getByteFrequencyData(data); const avg = data.reduce((a, b) => a + b, 0) / data.length;
                        if(avg > 40) els.headCasing.classList.add('shake'); else els.headCasing.classList.remove('shake');
                    }, 100);
                    showToast('Mic Sync ON');
                } catch { beatActive = false; showToast('Mic access denied'); document.getElementById('micToggle').classList.remove('active'); }
            }
            function stopBeatSync() { beatActive = false; if(beatStream) { beatStream.getTracks().forEach(t => t.stop()); beatStream = null; } if(beatInterval) clearInterval(beatInterval); els.headCasing.classList.remove('shake'); showToast('Mic Sync OFF'); }

            document.getElementById('micToggle').addEventListener('click', function() {
                if(!beatActive) { this.classList.add('active'); startBeatSync(); } 
                else { this.classList.remove('active'); stopBeatSync(); }
            });

            // --- Basic Toggles ---
            document.getElementById('soundToggle').addEventListener('click', function() { sound = !sound; this.classList.toggle('active', sound); this.textContent = sound ? '🎵' : '🔇'; initAudio(); });
            document.getElementById('vibrateToggle').addEventListener('click', function() { vibrate = !vibrate; this.classList.toggle('active', vibrate); this.textContent = vibrate ? '📳' : '📴'; });

            resetAutoChange();
        })();
    </script>
</body>
</html>
