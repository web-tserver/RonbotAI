<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RonBot · Click-to-Chat</title>
    <style>
        :root {
            --primary: #ff007f;
            --primary-glow: rgba(255, 0, 127, 0.6);
            --bg-light: #f4f7f6;
            --bg-dark: #0a0f16;
            --head-bg-light: #ffffff;
            --head-bg-dark: #161c24;
            --screen-bg: #0d1117;
            --panel-bg: rgba(255, 255, 255, 0.1);
            --panel-border: rgba(255, 255, 255, 0.2);
            --text-color: #333;
        }

        body.dark {
            --bg-light: var(--bg-dark);
            --head-bg-light: var(--head-bg-dark);
            --panel-bg: rgba(10, 15, 22, 0.6);
            --panel-border: rgba(255, 0, 127, 0.3);
            --text-color: #eee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body {
            display: flex; min-height: 100vh; background: var(--bg-light);
            color: var(--text-color); transition: background 0.6s ease;
            overflow: hidden; user-select: none;
        }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(var(--panel-border) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .stage {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            perspective: 1200px; position: relative; z-index: 10; gap: 20px;
        }

        .parallax-wrapper {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        .robot-head {
            width: min(220px, 50vmin); height: min(220px, 50vmin);
            background: var(--head-bg-light); border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), inset 0 8px 25px rgba(255,255,255,0.4), inset 0 -10px 20px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center; position: relative;
            animation: float 6s ease-in-out infinite; transform-style: preserve-3d;
            transition: background 0.4s, box-shadow 0.4s;
        }
        body.dark .robot-head { box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 8px 25px rgba(255,255,255,0.05), inset 0 -10px 20px rgba(0,0,0,0.4); }

        @keyframes float { 0%,100%{transform: translateY(0px);} 50%{transform: translateY(-15px);} }

        .ear { position: absolute; top: 50%; transform: translateY(-50%); width: 12px; height: 40%; background: #555; border-radius: 6px; z-index: -1; }
        .ear.left { left: -6px; } .ear.right { right: -6px; }

        .led-strip { position: absolute; top: 50%; transform: translateY(-50%); width: 4px; height: 50%; border-radius: 2px; background: var(--primary); box-shadow: 0 0 12px var(--primary-glow); z-index: 20; opacity: 0.8; transition: background 0.3s, box-shadow 0.3s; }
        .led-strip.left { left: 12px; } .led-strip.right { right: 12px; }

        .screen {
            width: 75%; height: 75%; background: var(--screen-bg); border-radius: 20px;
            border: 3px solid var(--primary); box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 30px var(--primary-glow);
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
            transform: translateZ(20px); transition: border-color 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.03) 50%, rgba(255,255,255,0)); background-size: 100% 8px; pointer-events: none; z-index: 5; opacity: 0.3; }
        .glare { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 40%); transform: rotate(15deg); pointer-events: none; z-index: 4; transition: transform 0.1s ease-out; }

        .face-container { display: flex; flex-direction: column; align-items: center; gap: 14px; z-index: 2; transform: translateZ(10px); }
        .eyes { display: flex; gap: 30px; }
        .eye {
            width: 16px; height: 16px; background: var(--primary); border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 15px var(--primary-glow);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .pupil {
            width: 6px; height: 6px; background: #fff; border-radius: 2px;
            position: absolute; transition: transform 0.05s linear;
            box-shadow: 0 0 6px rgba(255,255,255,0.8);
        }
        .mouth { height: 14px; width: 60px; border-bottom: 4px solid var(--primary); border-radius: 0 0 30px 30px; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 4px 10px var(--primary-glow)); }

        /* Moods (same as before, trimmed for length but fully functional) */
        .face-container.bored .eye { height: 6px; border-radius: 2px; transform: translateY(5px); opacity: 0.6; }
        .face-container.bored .mouth { width: 20px; height: 4px; background: var(--primary); border-radius: 2px; border: none; opacity: 0.6; }
        .face-container.mad .eye { height: 6px; transform: rotate(20deg); }
        .face-container.mad .eye:last-child { transform: rotate(-20deg); }
        .face-container.mad .mouth { border-top: 4px solid var(--primary); border-bottom: none; border-radius: 30px 30px 0 0; }
        .face-container.charging .eye { animation: pulse-eye 1s infinite alternate; }
        .face-container.charging .mouth { width: 40px; height: 8px; background: rgba(0,0,0,0.5); border: 1px solid var(--primary); border-radius: 4px; position: relative; overflow: hidden; }
        .face-container.charging .mouth::after { content:''; position:absolute; left:0; top:0; height:100%; width:100%; background:var(--primary); animation: progress 2s infinite ease-in-out; }
        .face-container.busy .eye { width:12px; height:12px; border-radius:50%; animation: spin-busy 0.8s linear infinite; }
        .face-container.busy .eye:first-child { animation-delay:0.15s; }
        .face-container.busy .mouth { width:36px; height:4px; background:var(--primary); border-radius:2px; animation: pulse-busy 1s ease-in-out infinite; border: none; }
        .face-container.love .eye { background:transparent; box-shadow:none; width:18px; height:16px; position:relative; }
        .face-container.love .eye::before, .face-container.love .eye::after { content:''; position:absolute; width:9px; height:14px; background:var(--primary); border-radius:50px 50px 0 0; box-shadow:0 0 12px var(--primary-glow); }
        .face-container.love .eye::before { left:0; transform:rotate(-45deg); transform-origin:bottom left; }
        .face-container.love .eye::after { right:0; transform:rotate(45deg); transform-origin:bottom right; }
        .face-container.love .mouth { width:20px; height:10px; border-bottom:3px solid var(--primary); border-radius:0 0 20px 20px; }
        .face-container.wink .eye:first-child { height:4px; border-radius:2px; margin-top:8px; transform:none; }
        .face-container.wink .eye:last-child { border-radius:8px 8px 2px 2px; height:10px; width:15px; }
        .face-container.wink .mouth { width:28px; height:12px; border-bottom:3px solid var(--primary); border-radius:0 0 20px 20px; }
        .face-container.confused .eye { width:14px; height:14px; border-radius:50%; background:transparent; border:2px solid var(--primary); box-shadow:0 0 8px var(--primary-glow); }
        .face-container.confused .eye::after { content:''; position:absolute; width:4px; height:4px; background:var(--primary); border-radius:50%; top:3px; left:3px; }
        .face-container.confused .mouth { width:20px; height:20px; border:2px solid var(--primary); border-radius:50%; border-top-color:transparent; border-left-color:transparent; transform:rotate(45deg); }
        .face-container.asleep .eye { height:2px; width:12px; border-radius:1px; opacity:0.4; margin-top:8px; }
        .face-container.asleep .mouth { width:15px; height:6px; background:var(--primary); opacity:0.4; border-radius:2px; border:none; }
        .face-container.surprised .eye { width:14px; height:14px; border-radius:50%; }
        .face-container.surprised .mouth { width:18px; height:18px; border:2px solid var(--primary); border-radius:50%; border-bottom: none; }
        .face-container.thinking .eye:first-child { transform:translateX(-4px); }
        .face-container.thinking .eye:last-child { transform:translateX(4px); }
        .face-container.thinking .mouth { width:10px; height:10px; background:var(--primary); border-radius:50%; margin-left:20px; border:none; }
        .face-container.glitch .eye { animation: glitch-eyes 0.2s infinite; }
        .face-container.glitch .mouth { background:var(--primary); height:4px; width:30px; border-radius:0; animation: glitch-mouth 0.15s infinite; border:none; }

        @keyframes pulse-eye { 0%{opacity:0.3; transform:scale(0.8);} 100%{opacity:1; transform:scale(1.1);} }
        @keyframes progress { 0%{transform: translateX(-100%);} 100%{transform: translateX(0);} }
        @keyframes spin-busy { 0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(0.8);}100%{transform:rotate(360deg) scale(1);} }
        @keyframes pulse-busy { 0%,100%{opacity:0.4; width:36px;}50%{opacity:1; width:52px;} }
        @keyframes glitch-eyes { 0%{transform:translate(0);}25%{transform:translate(-2px,1px);}50%{transform:translate(2px,-1px);}75%{transform:translate(-1px,-2px);}100%{transform:translate(1px,1px);} }
        @keyframes glitch-mouth { 0%{transform:scaleX(1);}50%{transform:scaleX(1.4);}100%{transform:scaleX(0.8);} }

        .emoji-accent { position: absolute; top: 8px; right: 10px; font-size: 0.9rem; z-index: 6; pointer-events: none; }
        .lock-icon { position: absolute; top: 8px; left: 10px; font-size: 0.8rem; z-index: 6; opacity: 0; transition: 0.2s; }
        .locked .lock-icon { opacity: 1; }

        .speech {
            position: absolute; top: -60px; right: -20px; background: var(--bg-dark); color: var(--primary);
            padding: 8px 16px; border-radius: 12px 12px 12px 0; font-size: 0.85rem; font-weight: bold;
            border: 1px solid var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 15px var(--primary-glow);
            opacity: 0; transform: translateY(10px); transition: 0.3s;
            pointer-events: none; z-index: 50; max-width: 250px; white-space: pre-wrap; word-break: break-word;
        }
        .speech.show { opacity: 1; transform: translateY(0); }

        .zzz { position: absolute; top: 10px; right: -20px; color: var(--primary); font-weight: bold; display: none; z-index: 50; animation: floatZ 2s infinite; }
        @keyframes floatZ { 0%{opacity:0.2;transform:translateY(0);}50%{opacity:0.7;}100%{opacity:0;transform:translateY(-15px);} }

        .shadow { width: 120px; height: 15px; background: radial-gradient(ellipse, rgba(0,0,0,0.2) 0%, transparent 70%); border-radius: 50%; animation: shadow-scale 6s ease-in-out infinite; }
        body.dark .shadow { background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%); }
        @keyframes shadow-scale { 0%,100%{transform:scale(1); opacity:0.8;} 50%{transform:scale(0.8); opacity:0.4;} }

        .toast { position:fixed; bottom:30px; left:50%; transform:translate(-50%, 20px); background:var(--primary); color:white; padding:10px 20px; border-radius:30px; font-size:0.8rem; font-weight:bold; z-index:200; opacity:0; transition:0.3s; pointer-events:none; box-shadow: 0 10px 20px rgba(255,0,127,0.3); }
        .toast.show { opacity:1; transform:translate(-50%, 0); }

        /* Quick toggles (right top) */
        .quick-toggles { position: fixed; top: 20px; right: 20px; display: flex; gap: 12px; z-index: 100; }
        .toggle-btn {
            width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--panel-border);
            background: var(--panel-bg); backdrop-filter: blur(8px); cursor: pointer;
            font-size: 1.2rem; display: flex; justify-content: center; align-items: center;
            color: var(--text-color); transition: 0.3s; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .toggle-btn:hover { border-color: var(--primary); transform: translateY(-3px); }
        .toggle-btn.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 0 20px var(--primary-glow); }

        /* Chat bar below robot */
        .chat-bar {
            width: min(280px, 80vmin);
            background: rgba(10,15,20,0.8); backdrop-filter: blur(10px);
            border: 1px solid var(--primary); border-radius: 20px;
            padding: 10px 16px; display: flex; gap: 10px; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 15px var(--primary-glow);
            transform: translateY(20px); opacity: 0; pointer-events: none;
            transition: transform 0.25s ease, opacity 0.25s;
            z-index: 30;
        }
        .chat-bar.open {
            transform: translateY(0); opacity: 1; pointer-events: auto;
        }
        .chat-bar input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 8px 0; outline: none; font-size: 0.9rem;
        }
        .chat-bar input::placeholder { color: rgba(255,255,255,0.5); }
        .chat-bar button {
            background: var(--primary); border: none; color: white; padding: 8px 14px;
            border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }

        /* Dashboard (settings) kept but hidden by default, toggled by menu button */
        .menu-trigger {
            position: fixed; top: 20px; left: 20px; z-index: 99;
            width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--panel-border);
            background: var(--panel-bg); backdrop-filter: blur(8px); cursor: pointer;
            font-size: 1.2rem; display: flex; justify-content: center; align-items: center;
            color: var(--text-color); transition: 0.3s; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .dashboard {
            position: fixed; top: 80px; left: 20px; width: 280px;
            background: var(--panel-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border); border-radius: 20px;
            padding: 20px; z-index: 90; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: none; max-height: 70vh; overflow-y: auto;
        }
        .dashboard.open { display: block; }

        @media (max-width: 600px) {
            .robot-head { width: 180px; height: 180px; }
            .chat-bar { width: 90%; }
        }
    </style>
</head>
<body class="dark">

    <div class="bg-grid"></div>
    <div class="toast" id="toast">SYSTEM ONLINE</div>

    <!-- Settings dashboard toggle -->
    <button class="menu-trigger" id="menuBtn" title="Settings">⚙️</button>
    <aside class="dashboard" id="dashboard">
        <h2 style="color:var(--primary); margin-bottom:15px;">System Config</h2>
        <div style="margin-bottom:15px;">
            <label style="font-size:0.7rem;">Mood Queue</label>
            <input type="text" id="queueInput" value="smile,bored,charging,mad,busy,love" style="width:100%; padding:6px; border-radius:6px; border:1px solid var(--panel-border); background:rgba(0,0,0,0.3); color:white;">
            <button id="applyQueueBtn" style="margin-top:6px; background:var(--primary); border:none; color:white; padding:6px 12px; border-radius:6px;">Apply</button>
        </div>
        <!-- other settings can be added but minimal for now -->
    </aside>

    <!-- Quick toggles (voice, sound, dark, etc.) -->
    <div class="quick-toggles">
        <button class="toggle-btn" id="voiceToggle" title="Voice">🎤</button>
        <button class="toggle-btn" id="soundToggle" title="Sound">🔇</button>
        <button class="toggle-btn active" id="darkToggle" title="Dark/Light">🌓</button>
    </div>

    <main class="stage" id="stage">
        <div class="parallax-wrapper" id="parallax">
            <div class="speech" id="speechBubble">Hello!</div>
            <div class="robot-head" id="ronbot">
                <div class="ear left"></div><div class="ear right"></div>
                <div class="led-strip left"></div><div class="led-strip right"></div>
                <span class="lock-icon" id="lockIcon">🔒</span>
                <span class="zzz" id="zzz">Zzz</span>
                <div class="screen" id="screen">
                    <div class="glare" id="glare"></div>
                    <div class="scanline"></div>
                    <div class="face-container" id="face">
                        <div class="eyes">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth"></div>
                    </div>
                    <span class="emoji-accent" id="emojiAccent"></span>
                </div>
            </div>
            <div class="shadow"></div>
        </div>

        <!-- Chat bar below robot -->
        <div class="chat-bar" id="chatBar">
            <input type="text" id="chatInput" placeholder="Ask me anything...">
            <button id="sendBtn">Send</button>
        </div>
    </main>

    <script>
        (() => {
            const defaultMoods = {
                smile:   { color: '#50e890', phrase: 'Happy!', freq: 440 },
                bored:   { color: '#4af0ff', phrase: 'Meh.', freq: 220 },
                mad:     { color: '#ff5e7a', phrase: 'Grrr!', freq: 330 },
                busy:    { color: '#4af0ff', phrase: 'Processing...', freq: 660 },
                love:    { color: '#ff5e7a', phrase: 'Love!', freq: 520 },
                thinking:{ color: '#b983ff', phrase: 'Hmm...', freq: 400 },
            };
            let moodQueue = ['smile','bored','busy','love','thinking'];
            let currentIdx = 0;
            const face = document.getElementById('face');
            const screen = document.getElementById('screen');
            const speechBubble = document.getElementById('speechBubble');
            const chatBar = document.getElementById('chatBar');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const pupils = document.querySelectorAll('.pupil');
            const parallax = document.getElementById('parallax');
            const glare = document.getElementById('glare');
            const toast = document.getElementById('toast');
            const darkToggle = document.getElementById('darkToggle');
            const soundToggle = document.getElementById('soundToggle');
            const voiceToggle = document.getElementById('voiceToggle');
            const menuBtn = document.getElementById('menuBtn');
            const dashboard = document.getElementById('dashboard');

            let soundEnabled = false, audioCtx;
            const DEEPSEEK_KEY = 'sk-2617e54901324f42a53521c1473139d8';

            function applyMood(mood) {
                const def = defaultMoods[mood];
                document.documentElement.style.setProperty('--primary', def.color);
                face.className = 'face-container ' + mood;
            }

            function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }

            // Toggle chat bar on screen click
            screen.addEventListener('click', (e) => {
                e.stopPropagation();
                chatBar.classList.toggle('open');
                if (chatBar.classList.contains('open')) chatInput.focus();
            });

            // Close chat bar when clicking outside
            document.addEventListener('click', (e) => {
                if (!chatBar.contains(e.target) && e.target !== screen) {
                    chatBar.classList.remove('open');
                }
            });

            // AI Chat send
            async function sendMessage() {
                const text = chatInput.value.trim();
                if (!text) return;
                chatInput.value = '';
                applyMood('thinking');
                speechBubble.textContent = '...';
                speechBubble.classList.add('show');
                try {
                    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${DEEPSEEK_KEY}`
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: [{role:'system', content:'You are RonBot, a cute robot. Keep replies short, playful and under 2 sentences.'}, {role:'user', content:text}],
                            temperature:0.8, max_tokens:100
                        })
                    });
                    const data = await res.json();
                    let reply = data.choices?.[0]?.message?.content || "I didn't get that.";
                    speechBubble.textContent = reply;
                    applyMood('smile');
                } catch (e) {
                    speechBubble.textContent = 'Oops, my brain glitched.';
                    applyMood('mad');
                }
                setTimeout(() => speechBubble.classList.remove('show'), 4000);
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

            // Eye tracking
            document.addEventListener('mousemove', (e) => {
                const rect = screen.getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
                    const dx = (e.clientX - cx) / (rect.width/2) * 4;
                    const dy = (e.clientY - cy) / (rect.height/2) * 4;
                    pupils.forEach(p => p.style.transform = `translate(${dx}px, ${dy}px)`);
                } else pupils.forEach(p => p.style.transform = 'translate(0,0)');
                // parallax
                const x = (window.innerWidth/2 - e.pageX)/25, y = (window.innerHeight/2 - e.pageY)/25;
                parallax.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
                const relX = (e.clientX - rect.left)/rect.width, relY = (e.clientY - rect.top)/rect.height;
                glare.style.transform = `translate(${(relX-0.5)*30}px, ${(relY-0.5)*30}px) rotate(15deg)`;
            });

            // Toggles
            darkToggle.addEventListener('click', ()=> {
                document.body.classList.toggle('dark');
                darkToggle.classList.toggle('active');
            });
            soundToggle.addEventListener('click', ()=> {
                soundEnabled = !soundEnabled;
                if (soundEnabled && !audioCtx) audioCtx = new AudioContext();
                soundToggle.classList.toggle('active');
                soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
            });
            voiceToggle.addEventListener('click', ()=> {
                voiceToggle.classList.toggle('active');
                showToast('Voice coming soon');
            });
            menuBtn.addEventListener('click', ()=> dashboard.classList.toggle('open'));

            // Init
            applyMood('smile');
            speechBubble.classList.add('show');
            setTimeout(() => speechBubble.classList.remove('show'), 3000);
        })();
    </script>
</body>
</html>
