<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RonBot OS Pro · DeepSeek AI Chat</title>
    <style>
        :root {
            --primary: #ff007f;
            --primary-glow: rgba(255, 0, 127, 0.6);
            --bg-light: #f4f7f6;
            --bg-dark: #0a0f16;
            --head-bg-light: #ffffff;
            --head-bg-dark: #161c24;
            --screen-bg: #0d1117;
            --panel-bg: rgba(255, 255, 255, 0.1);
            --panel-border: rgba(255, 255, 255, 0.2);
            --text-color: #333;
        }

        body.dark {
            --bg-light: var(--bg-dark);
            --head-bg-light: var(--head-bg-dark);
            --panel-bg: rgba(10, 15, 22, 0.6);
            --panel-border: rgba(255, 0, 127, 0.3);
            --text-color: #eee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body {
            display: flex; min-height: 100vh; background: var(--bg-light);
            color: var(--text-color); transition: background 0.6s ease;
            overflow: hidden; user-select: none;
        }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(var(--panel-border) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .dashboard {
            position: absolute; top: 20px; left: 20px; width: 300px;
            background: var(--panel-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border); border-radius: 20px;
            padding: 24px; z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform: translateX(-120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 80vh; overflow-y: auto;
        }
        .dashboard.open { transform: translateX(0); }

        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .dash-header h2 { font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }
        .close-dash { background: transparent; border: none; color: var(--text-color); cursor: pointer; font-size: 1.2rem; }

        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 0.75rem; margin-bottom: 8px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
        .control-group input, .control-group select {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border);
            color: var(--text-color); padding: 10px; border-radius: 8px; outline: none; font-size: 0.8rem;
        }
        .control-group input:focus, .control-group select:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        .btn {
            background: transparent; border: 1px solid var(--primary); color: var(--primary);
            padding: 8px 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;
            transition: 0.2s; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; margin-top: 8px;
        }
        .btn:hover { background: var(--primary); color: white; box-shadow: 0 0 15px var(--primary-glow); }
        .btn-group { display: flex; gap: 8px; }
        .btn-group .btn { flex: 1; }

        .quick-toggles { position: fixed; top: 20px; right: 20px; display: flex; gap: 12px; z-index: 100; }
        .toggle-btn {
            width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--panel-border);
            background: var(--panel-bg); backdrop-filter: blur(8px); cursor: pointer;
            font-size: 1.2rem; display: flex; justify-content: center; align-items: center;
            color: var(--text-color); transition: 0.3s; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            position: relative;
        }
        .toggle-btn:hover { border-color: var(--primary); transform: translateY(-3px); }
        .toggle-btn.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 0 20px var(--primary-glow); }

        .menu-trigger { position: fixed; top: 20px; left: 20px; z-index: 99; transition: opacity 0.3s; }

        .stage {
            flex: 1; display: flex; justify-content: center; align-items: center;
            perspective: 1200px; position: relative; z-index: 10;
        }

        .parallax-wrapper {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        .robot-head {
            width: min(220px, 50vmin); height: min(220px, 50vmin);
            background: var(--head-bg-light); border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), inset 0 8px 25px rgba(255,255,255,0.4), inset 0 -10px 20px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center; position: relative;
            animation: float 6s ease-in-out infinite; transform-style: preserve-3d;
            transition: background 0.4s, box-shadow 0.4s;
        }
        body.dark .robot-head { box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 8px 25px rgba(255,255,255,0.05), inset 0 -10px 20px rgba(0,0,0,0.4); }

        @keyframes float { 0%,100%{transform: translateY(0px);} 50%{transform: translateY(-15px);} }

        .ear { position: absolute; top: 50%; transform: translateY(-50%); width: 12px; height: 40%; background: #555; border-radius: 6px; z-index: -1; }
        .ear.left { left: -6px; } .ear.right { right: -6px; }

        .led-strip { position: absolute; top: 50%; transform: translateY(-50%); width: 4px; height: 50%; border-radius: 2px; background: var(--primary); box-shadow: 0 0 12px var(--primary-glow); z-index: 20; opacity: 0.8; transition: background 0.3s, box-shadow 0.3s; }
        .led-strip.left { left: 12px; } .led-strip.right { right: 12px; }

        .screen {
            width: 75%; height: 75%; background: var(--screen-bg); border-radius: 20px;
            border: 3px solid var(--primary); box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 30px var(--primary-glow);
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
            transform: translateZ(20px); transition: border-color 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.03) 50%, rgba(255,255,255,0)); background-size: 100% 8px; pointer-events: none; z-index: 5; opacity: 0.3; }
        .glare { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 40%); transform: rotate(15deg); pointer-events: none; z-index: 4; transition: transform 0.1s ease-out; }

        .face-container { display: flex; flex-direction: column; align-items: center; gap: 14px; z-index: 2; transform: translateZ(10px); }
        .eyes { display: flex; gap: 30px; }
        .eye {
            width: 16px; height: 16px; background: var(--primary); border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 15px var(--primary-glow);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .pupil {
            width: 6px; height: 6px; background: #fff; border-radius: 2px;
            position: absolute; transition: transform 0.05s linear;
            box-shadow: 0 0 6px rgba(255,255,255,0.8);
        }
        .mouth { height: 14px; width: 60px; border-bottom: 4px solid var(--primary); border-radius: 0 0 30px 30px; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 4px 10px var(--primary-glow)); }

        /* Moods */
        .face-container.bored .eye { height: 6px; border-radius: 2px; transform: translateY(5px); opacity: 0.6; }
        .face-container.bored .mouth { width: 20px; height: 4px; background: var(--primary); border-radius: 2px; border: none; opacity: 0.6; }
        .face-container.mad .eye { height: 6px; transform: rotate(20deg); }
        .face-container.mad .eye:last-child { transform: rotate(-20deg); }
        .face-container.mad .mouth { border-top: 4px solid var(--primary); border-bottom: none; border-radius: 30px 30px 0 0; }
        .face-container.charging .eye { animation: pulse-eye 1s infinite alternate; }
        .face-container.charging .mouth { width: 40px; height: 8px; background: rgba(0,0,0,0.5); border: 1px solid var(--primary); border-radius: 4px; position: relative; overflow: hidden; }
        .face-container.charging .mouth::after { content:''; position:absolute; left:0; top:0; height:100%; width:100%; background:var(--primary); animation: progress 2s infinite ease-in-out; }
        .face-container.busy .eye { width:12px; height:12px; border-radius:50%; animation: spin-busy 0.8s linear infinite; }
        .face-container.busy .eye:first-child { animation-delay:0.15s; }
        .face-container.busy .mouth { width:36px; height:4px; background:var(--primary); border-radius:2px; animation: pulse-busy 1s ease-in-out infinite; border: none; }
        .face-container.love .eye { background:transparent; box-shadow:none; width:18px; height:16px; position:relative; }
        .face-container.love .eye::before, .face-container.love .eye::after { content:''; position:absolute; width:9px; height:14px; background:var(--primary); border-radius:50px 50px 0 0; box-shadow:0 0 12px var(--primary-glow); }
        .face-container.love .eye::before { left:0; transform:rotate(-45deg); transform-origin:bottom left; }
        .face-container.love .eye::after { right:0; transform:rotate(45deg); transform-origin:bottom right; }
        .face-container.love .mouth { width:20px; height:10px; border-bottom:3px solid var(--primary); border-radius:0 0 20px 20px; }
        .face-container.wink .eye:first-child { height:4px; border-radius:2px; margin-top:8px; transform:none; }
        .face-container.wink .eye:last-child { border-radius:8px 8px 2px 2px; height:10px; width:15px; }
        .face-container.wink .mouth { width:28px; height:12px; border-bottom:3px solid var(--primary); border-radius:0 0 20px 20px; }
        .face-container.confused .eye { width:14px; height:14px; border-radius:50%; background:transparent; border:2px solid var(--primary); box-shadow:0 0 8px var(--primary-glow); }
        .face-container.confused .eye::after { content:''; position:absolute; width:4px; height:4px; background:var(--primary); border-radius:50%; top:3px; left:3px; }
        .face-container.confused .mouth { width:20px; height:20px; border:2px solid var(--primary); border-radius:50%; border-top-color:transparent; border-left-color:transparent; transform:rotate(45deg); }
        .face-container.asleep .eye { height:2px; width:12px; border-radius:1px; opacity:0.4; margin-top:8px; }
        .face-container.asleep .mouth { width:15px; height:6px; background:var(--primary); opacity:0.4; border-radius:2px; border:none; }
        .face-container.surprised .eye { width:14px; height:14px; border-radius:50%; }
        .face-container.surprised .mouth { width:18px; height:18px; border:2px solid var(--primary); border-radius:50%; border-bottom: none; }
        .face-container.thinking .eye:first-child { transform:translateX(-4px); }
        .face-container.thinking .eye:last-child { transform:translateX(4px); }
        .face-container.thinking .mouth { width:10px; height:10px; background:var(--primary); border-radius:50%; margin-left:20px; border:none; }
        .face-container.glitch .eye { animation: glitch-eyes 0.2s infinite; }
        .face-container.glitch .mouth { background:var(--primary); height:4px; width:30px; border-radius:0; animation: glitch-mouth 0.15s infinite; border:none; }

        @keyframes pulse-eye { 0%{opacity:0.3; transform:scale(0.8);} 100%{opacity:1; transform:scale(1.1);} }
        @keyframes progress { 0%{transform: translateX(-100%);} 100%{transform: translateX(0);} }
        @keyframes spin-busy { 0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(0.8);}100%{transform:rotate(360deg) scale(1);} }
        @keyframes pulse-busy { 0%,100%{opacity:0.4; width:36px;}50%{opacity:1; width:52px;} }
        @keyframes glitch-eyes { 0%{transform:translate(0);}25%{transform:translate(-2px,1px);}50%{transform:translate(2px,-1px);}75%{transform:translate(-1px,-2px);}100%{transform:translate(1px,1px);} }
        @keyframes glitch-mouth { 0%{transform:scaleX(1);}50%{transform:scaleX(1.4);}100%{transform:scaleX(0.8);} }

        .emoji-accent { position: absolute; top: 8px; right: 10px; font-size: 0.9rem; z-index: 6; pointer-events: none; }
        .lock-icon { position: absolute; top: 8px; left: 10px; font-size: 0.8rem; z-index: 6; opacity: 0; transition: 0.2s; }
        .locked .lock-icon { opacity: 1; }

        .speech {
            position: absolute; top: -60px; right: -20px; background: var(--bg-dark); color: var(--primary);
            padding: 8px 16px; border-radius: 12px 12px 12px 0; font-size: 0.85rem; font-weight: bold;
            border: 1px solid var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 15px var(--primary-glow);
            opacity: 0; transform: translateY(10px) translateZ(30px); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; z-index: 50; max-width: 250px; white-space: pre-wrap; word-break: break-word;
        }
        .speech.show { opacity: 1; transform: translateY(0) translateZ(30px); }

        .zzz { position: absolute; top: 10px; right: -20px; color: var(--primary); font-weight: bold; display: none; z-index: 50; animation: floatZ 2s infinite; }
        @keyframes floatZ { 0%{opacity:0.2;transform:translateY(0);}50%{opacity:0.7;}100%{opacity:0;transform:translateY(-15px);} }

        .pip-monitor {
            position: fixed; bottom: 20px; right: 20px; width: 160px; height: 120px;
            background: #000; border: 2px solid var(--primary); border-radius: 12px;
            overflow: hidden; opacity: 0; transform: translateY(20px); transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--primary-glow); z-index: 90;
        }
        .pip-monitor.active { opacity: 1; transform: translateY(0); }
        .pip-monitor video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(120%); opacity: 0.6; }
        .pip-monitor::after { content: 'TRACKING...'; position: absolute; bottom: 5px; left: 8px; color: var(--primary); font-size: 0.5rem; font-weight: bold; letter-spacing: 1px; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        .mic-ring { position: absolute; inset: -10px; border-radius: 50%; border: 2px dashed var(--primary); opacity: 0; animation: spin-ring 4s linear infinite; pointer-events: none; }
        .toggle-btn.active .mic-ring { opacity: 0.6; }
        @keyframes spin-ring { 100% { transform: rotate(360deg); } }

        .toast { position:fixed; bottom:30px; left:50%; transform:translate(-50%, 20px); background:var(--primary); color:white; padding:10px 20px; border-radius:30px; font-size:0.8rem; font-weight:bold; z-index:200; opacity:0; transition:0.3s; pointer-events:none; box-shadow: 0 10px 20px rgba(255,0,127,0.3); }
        .toast.show { opacity:1; transform:translate(-50%, 0); }

        .shadow { position: absolute; bottom: -40px; width: 120px; height: 15px; background: radial-gradient(ellipse, rgba(0,0,0,0.2) 0%, transparent 70%); border-radius: 50%; animation: shadow-scale 6s ease-in-out infinite; }
        body.dark .shadow { background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%); }
        @keyframes shadow-scale { 0%,100%{transform:scale(1); opacity:0.8;} 50%{transform:scale(0.8); opacity:0.4;} }

        /* Chat panel styles */
        .chat-panel {
            position: fixed; bottom: 20px; left: 20px; width: 300px; max-height: 400px;
            background: var(--panel-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border); border-radius: 20px;
            padding: 16px; z-index: 200; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
            transform: translateY(120%); transition: transform 0.3s ease;
        }
        .chat-panel.open { transform: translateY(0); }
        .chat-messages {
            flex: 1; overflow-y: auto; margin-bottom: 12px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .message {
            padding: 8px 12px; border-radius: 12px; max-width: 80%;
            font-size: 0.8rem; line-height: 1.4;
        }
        .message.user {
            align-self: flex-end; background: var(--primary); color: white;
        }
        .message.assistant {
            align-self: flex-start; background: rgba(255,255,255,0.1); color: var(--text-color);
        }
        .chat-input-area {
            display: flex; gap: 8px;
        }
        .chat-input {
            flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border);
            color: var(--text-color); padding: 8px 12px; border-radius: 8px;
            outline: none; font-size: 0.8rem;
        }
        .chat-input:focus { border-color: var(--primary); box-shadow: 0 0 8px var(--primary-glow); }
        .send-btn {
            background: var(--primary); border: none; color: white; padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem;
        }
        .send-btn:hover { box-shadow: 0 0 15px var(--primary-glow); }

        @media (max-width: 600px) {
            .dashboard, .chat-panel { width: 260px; }
            .quick-toggles { gap: 8px; }
            .toggle-btn { width: 40px; height: 40px; font-size: 1rem; }
        }
    </style>
</head>
<body class="dark">

    <div class="bg-grid"></div>
    <div class="toast" id="toast">SYSTEM ONLINE</div>

    <button class="toggle-btn menu-trigger" id="menuBtn" title="Dashboard">⚙️</button>
    <div class="quick-toggles">
        <button class="toggle-btn" id="chatToggle" title="AI Chat">💬</button>
        <button class="toggle-btn" id="cameraToggle" title="Face Tracking">📷</button>
        <button class="toggle-btn" id="voiceToggle" title="Voice Control">🎤<div class="mic-ring"></div></button>
        <button class="toggle-btn" id="soundToggle" title="Sound Effects">🔇</button>
        <button class="toggle-btn active" id="darkToggle" title="Theme">🌓</button>
    </div>

    <aside class="dashboard" id="dashboard">
        <div class="dash-header">
            <h2>System Config</h2>
            <button class="close-dash" id="closeDashBtn">&times;</button>
        </div>
        <div class="control-group">
            <label>Primary Color</label>
            <input type="text" id="colorInput" value="#ff007f">
        </div>
        <div class="control-group">
            <label>Mood Queue (comma separated)</label>
            <input type="text" id="queueInput" value="smile,bored,charging,mad,busy,love">
        </div>
        <button class="btn" id="applyQueueBtn">Apply Queue</button>

        <div class="control-group" style="margin-top:15px;">
            <label>Playlists</label>
            <select id="playlistSelect"><option value="">Load playlist...</option></select>
            <div class="btn-group">
                <button class="btn" id="savePlaylistBtn">Save</button>
                <button class="btn" id="loadPlaylistBtn">Load</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn" id="exportBtn">Export</button>
            <button class="btn" id="importBtn">Import</button>
            <input type="file" id="importFile" accept=".json" style="display:none;">
        </div>

        <div class="control-group" style="margin-top:15px;">
            <label>Custom Mood Editor</label>
            <div style="display:flex; gap:8px;">
                <select id="customEyeSelect">
                    <option value="circle">Circle</option><option value="square">Square</option><option value="line">Line</option><option value="heart">Heart</option>
                </select>
                <select id="customMouthSelect">
                    <option value="smile">Smile</option><option value="frown">Frown</option><option value="straight">Straight</option><option value="circle">Circle</option>
                </select>
            </div>
            <button class="btn" id="addCustomMoodBtn" style="margin-top:8px;">Add Custom Mood</button>
        </div>

        <div style="margin-top: 20px;">
            <label style="font-size: 0.65rem; opacity: 0.5; display:block; text-align:center;">RONBOT OS v3.0</label>
        </div>
    </aside>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chatPanel">
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">Ask me anything!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Type a message...">
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
    </div>

    <div class="pip-monitor" id="pipMonitor">
        <video id="webcamVideo" autoplay muted playsinline></video>
    </div>

    <main class="stage" id="stage">
        <div class="parallax-wrapper" id="parallax">
            <div class="speech" id="speechBubble">Ready.</div>
            <div class="robot-head" id="ronbot">
                <div class="ear left"></div><div class="ear right"></div>
                <div class="led-strip left"></div><div class="led-strip right"></div>
                <span class="lock-icon" id="lockIcon">🔒</span>
                <span class="zzz" id="zzz">Zzz</span>

                <div class="screen" id="screen">
                    <div class="glare" id="glare"></div>
                    <div class="scanline"></div>
                    <div class="face-container" id="face">
                        <div class="eyes">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth"></div>
                    </div>
                    <span class="emoji-accent" id="emojiAccent"></span>
                </div>
            </div>
            <div class="shadow"></div>
        </div>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script>
        (() => {
            // ---- Mood Definitions ----
            const defaultMoods = {
                smile:   { color: '#50e890', phrase: 'Happy!', freq: 440 },
                bored:   { color: '#4af0ff', phrase: 'Meh.', freq: 220 },
                mad:     { color: '#ff5e7a', phrase: 'Grrr!', freq: 330 },
                busy:    { color: '#4af0ff', phrase: 'Processing...', freq: 660 },
                love:    { color: '#ff5e7a', phrase: 'Love!', freq: 520 },
                wink:    { color: '#ffe06b', phrase: 'Hey!', freq: 590 },
                confused:{ color: '#4af0ff', phrase: 'Huh?', freq: 370 },
                asleep:  { color: '#4af0ff', phrase: 'Zzz...', freq: 200 },
                surprised:{ color: '#ffe06b', phrase: 'Wow!', freq: 800 },
                thinking:{ color: '#b983ff', phrase: 'Hmm...', freq: 400 },
                glitch:  { color: '#ff5e7a', phrase: 'ERROR', freq: 0 },
                charging:{ color: '#50e890', phrase: 'Charging...', freq: 500 }
            };

            let customMoods = JSON.parse(localStorage.getItem('customMoods') || '{}');
            let moodQueue = JSON.parse(localStorage.getItem('moodQueue') || 'null') || Object.keys(defaultMoods);
            let currentIdx = 0;
            let autoInterval;
            let locked = false;
            let idleTimeout;
            let soundEnabled = false;
            let voiceEnabled = false;
            let cameraEnabled = false;
            let audioCtx;
            let recognition;
            let cameraStream;
            let trackingInterval;

            // DOM Elements
            const root = document.documentElement;
            const body = document.body;
            const face = document.getElementById('face');
            const screen = document.getElementById('screen');
            const speechBubble = document.getElementById('speechBubble');
            const emojiAccent = document.getElementById('emojiAccent');
            const lockIcon = document.getElementById('lockIcon');
            const zzzEl = document.getElementById('zzz');
            const ronbot = document.getElementById('ronbot');
            const parallax = document.getElementById('parallax');
            const glare = document.getElementById('glare');
            const toast = document.getElementById('toast');
            const pupils = document.querySelectorAll('.pupil');

            const menuBtn = document.getElementById('menuBtn');
            const dashboard = document.getElementById('dashboard');
            const closeDashBtn = document.getElementById('closeDashBtn');
            const colorInput = document.getElementById('colorInput');
            const queueInput = document.getElementById('queueInput');
            const applyQueueBtn = document.getElementById('applyQueueBtn');
            const playlistSelect = document.getElementById('playlistSelect');
            const savePlaylistBtn = document.getElementById('savePlaylistBtn');
            const loadPlaylistBtn = document.getElementById('loadPlaylistBtn');
            const exportBtn = document.getElementById('exportBtn');
            const importBtn = document.getElementById('importBtn');
            const importFile = document.getElementById('importFile');
            const customEyeSelect = document.getElementById('customEyeSelect');
            const customMouthSelect = document.getElementById('customMouthSelect');
            const addCustomMoodBtn = document.getElementById('addCustomMoodBtn');

            const darkToggle = document.getElementById('darkToggle');
            const cameraToggle = document.getElementById('cameraToggle');
            const voiceToggle = document.getElementById('voiceToggle');
            const soundToggle = document.getElementById('soundToggle');
            const chatToggle = document.getElementById('chatToggle');
            const chatPanel = document.getElementById('chatPanel');
            const chatMessages = document.getElementById('chatMessages');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');

            const pipMonitor = document.getElementById('pipMonitor');
            const webcamVideo = document.getElementById('webcamVideo');

            // Helper functions
            const showToast = (msg) => { toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); };
            const hexToRgb = (hex) => { const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : null; };
            const getMoodDef = (mood) => defaultMoods[mood] || customMoods[mood] || { color: '#aaa', phrase: mood, freq: 440 };

            function updatePrimaryColor(hex) {
                const rgb = hexToRgb(hex);
                if (rgb) {
                    root.style.setProperty('--primary', hex);
                    root.style.setProperty('--primary-glow', `rgba(${rgb}, 0.6)`);
                }
            }

            function applyMood(mood) {
                const def = getMoodDef(mood);
                updatePrimaryColor(def.color);
                face.className = 'face-container ' + mood;
                screen.style.borderColor = def.color;
                screen.style.boxShadow = `inset 0 0 40px rgba(0,0,0,0.8), 0 0 30px ${def.color}88`;
                const emojiMap = { love:'❤️', busy:'⚙️', asleep:'💤', charging:'🔋', glitch:'⚠️' };
                emojiAccent.textContent = emojiMap[mood] || '';
                zzzEl.style.display = mood === 'asleep' ? 'block' : 'none';
                localStorage.setItem('robotMoodIdx', currentIdx);
            }

            function showPhrase(mood, customPhrase = null) {
                const phrase = customPhrase || getMoodDef(mood).phrase;
                speechBubble.textContent = phrase;
                speechBubble.classList.add('show');
                clearTimeout(window.speechTimer);
                window.speechTimer = setTimeout(() => speechBubble.classList.remove('show'), 4000);
            }

            function playBeep(freq) {
                if (!soundEnabled || !audioCtx || freq === 0) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            }

            function changeMood(index = null, showBubble = true) {
                if (locked) return;
                if (index !== null) currentIdx = ((index % moodQueue.length) + moodQueue.length) % moodQueue.length;
                else currentIdx = (currentIdx + 1) % moodQueue.length;
                const mood = moodQueue[currentIdx];
                applyMood(mood);
                if (showBubble) showPhrase(mood);
                playBeep(getMoodDef(mood).freq);
                resetIdle();
                if (navigator.vibrate) navigator.vibrate(20);
            }

            function resetAutoCycle() {
                clearInterval(autoInterval);
                if (!locked) autoInterval = setInterval(() => changeMood(null, false), 5000);
            }

            function resetIdle() {
                clearTimeout(idleTimeout);
                idleTimeout = setTimeout(() => {
                    if (!locked) {
                        const prevMood = moodQueue[currentIdx];
                        applyMood('thinking');
                        setTimeout(() => applyMood(prevMood), 1200);
                    }
                }, 6000);
            }

            // Eye tracking
            function updatePupils(mouseX, mouseY) {
                const screenRect = screen.getBoundingClientRect();
                if (mouseX >= screenRect.left && mouseX <= screenRect.right &&
                    mouseY >= screenRect.top && mouseY <= screenRect.bottom) {
                    const centerX = screenRect.left + screenRect.width / 2;
                    const centerY = screenRect.top + screenRect.height / 2;
                    const maxDx = 4;
                    const maxDy = 4;
                    const dx = ((mouseX - centerX) / (screenRect.width / 2)) * maxDx;
                    const dy = ((mouseY - centerY) / (screenRect.height / 2)) * maxDy;
                    pupils.forEach(p => p.style.transform = `translate(${dx}px, ${dy}px)`);
                } else {
                    pupils.forEach(p => p.style.transform = 'translate(0, 0)');
                }
            }

            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 25;
                const y = (window.innerHeight / 2 - e.pageY) / 25;
                parallax.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
                const rect = screen.getBoundingClientRect();
                const relX = (e.clientX - rect.left) / rect.width;
                const relY = (e.clientY - rect.top) / rect.height;
                glare.style.transform = `translate(${(relX - 0.5) * 30}px, ${(relY - 0.5) * 30}px) rotate(15deg)`;
                updatePupils(e.clientX, e.clientY);
                resetIdle();
            });
            document.addEventListener('mouseleave', () => {
                parallax.style.transform = '';
                glare.style.transform = 'rotate(15deg)';
                pupils.forEach(p => p.style.transform = 'translate(0, 0)');
            });

            // Chat functionality
            chatToggle.addEventListener('click', () => {
                chatPanel.classList.toggle('open');
                chatToggle.classList.toggle('active');
                if (chatPanel.classList.contains('open')) {
                    chatInput.focus();
                }
            });

            // DeepSeek API configuration (YOUR PROVIDED KEY)
            const DEEPSEEK_API_KEY = 'sk-2617e54901324f42a53521c1473139d8';
            const DEEPSEEK_API_URL = 'https://api.deepseek.com/v1/chat/completions';

            async function fetchAIResponse(message) {
                try {
                    const response = await fetch(DEEPSEEK_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: [
                                { role: 'system', content: 'You are a friendly AI robot named RonBot. Keep responses short and playful.' },
                                { role: 'user', content: message }
                            ],
                            temperature: 0.7,
                            max_tokens: 150
                        })
                    });
                    const data = await response.json();
                    if (data.choices && data.choices.length > 0) {
                        return data.choices[0].message.content;
                    } else {
                        return "Hmm, I couldn't understand that.";
                    }
                } catch (error) {
                    return "Oops, I'm having trouble connecting to my brain right now.";
                }
            }

            async function sendMessage() {
                const text = chatInput.value.trim();
                if (!text) return;
                addMessage('user', text);
                chatInput.value = '';
                applyMood('thinking');
                showPhrase('thinking', 'Thinking...');
                const aiReply = await fetchAIResponse(text);
                addMessage('assistant', aiReply);
                showPhrase('smile', aiReply);
                applyMood('smile');
            }

            function addMessage(role, content) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${role}`;
                msgDiv.textContent = content;
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // Dashboard & UI
            menuBtn.addEventListener('click', () => { dashboard.classList.add('open'); menuBtn.style.opacity = '0'; });
            closeDashBtn.addEventListener('click', () => { dashboard.classList.remove('open'); menuBtn.style.opacity = '1'; });
            document.addEventListener('click', (e) => {
                if (!dashboard.contains(e.target) && e.target !== menuBtn) {
                    dashboard.classList.remove('open');
                    menuBtn.style.opacity = '1';
                }
            });

            applyQueueBtn.addEventListener('click', () => {
                const raw = queueInput.value.split(',').map(s => s.trim().toLowerCase()).filter(s => defaultMoods[s] || customMoods[s]);
                if (raw.length > 0) {
                    moodQueue = raw;
                    localStorage.setItem('moodQueue', JSON.stringify(moodQueue));
                    currentIdx = 0;
                    applyMood(moodQueue[0]);
                    resetAutoCycle();
                    showToast("QUEUE UPDATED");
                }
            });

            const playlists = JSON.parse(localStorage.getItem('moodPlaylists') || '{}');
            function updatePlaylistSelect() {
                playlistSelect.innerHTML = '<option value="">Load playlist...</option>';
                Object.keys(playlists).forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    playlistSelect.appendChild(opt);
                });
            }
            savePlaylistBtn.addEventListener('click', () => {
                const name = prompt('Playlist name:');
                if (name) {
                    playlists[name] = [...moodQueue];
                    localStorage.setItem('moodPlaylists', JSON.stringify(playlists));
                    updatePlaylistSelect();
                    showToast(`Saved "${name}"`);
                }
            });
            loadPlaylistBtn.addEventListener('click', () => {
                const name = playlistSelect.value;
                if (name && playlists[name]) {
                    moodQueue = playlists[name];
                    localStorage.setItem('moodQueue', JSON.stringify(moodQueue));
                    currentIdx = 0;
                    applyMood(moodQueue[0]);
                    resetAutoCycle();
                    showToast(`Loaded "${name}"`);
                }
            });

            exportBtn.addEventListener('click', () => {
                const data = { queue: moodQueue, customMoods };
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'ronbot-queue.json';
                a.click();
            });
            importBtn.addEventListener('click', () => importFile.click());
            importFile.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.queue) {
                            moodQueue = data.queue;
                            localStorage.setItem('moodQueue', JSON.stringify(moodQueue));
                        }
                        if (data.customMoods) {
                            customMoods = data.customMoods;
                            localStorage.setItem('customMoods', JSON.stringify(customMoods));
                        }
                        currentIdx = 0;
                        applyMood(moodQueue[0]);
                        resetAutoCycle();
                        showToast("IMPORTED");
                    } catch { alert('Invalid file'); }
                };
                reader.readAsText(file);
            });

            addCustomMoodBtn.addEventListener('click', () => {
                const eye = customEyeSelect.value;
                const mouth = customMouthSelect.value;
                const name = `custom_${eye}_${mouth}`;
                customMoods[name] = { color: '#b983ff', phrase: 'Custom', freq: 500 };
                localStorage.setItem('customMoods', JSON.stringify(customMoods));
                if (!moodQueue.includes(name)) {
                    moodQueue.push(name);
                    localStorage.setItem('moodQueue', JSON.stringify(moodQueue));
                }
                showToast(`Custom mood "${name}" added`);
            });

            darkToggle.addEventListener('click', () => {
                body.classList.toggle('dark');
                darkToggle.classList.toggle('active');
                showToast(body.classList.contains('dark') ? 'DARK MODE' : 'LIGHT MODE');
            });
            soundToggle.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                if (soundEnabled && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                soundToggle.classList.toggle('active', soundEnabled);
                soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
            });

            voiceToggle.addEventListener('click', () => {
                voiceEnabled = !voiceEnabled;
                voiceToggle.classList.toggle('active', voiceEnabled);
                if (voiceEnabled) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        recognition = new SpeechRecognition();
                        recognition.continuous = true;
                        recognition.interimResults = false;
                        recognition.onresult = (e) => {
                            const transcript = e.results[e.results.length - 1][0].transcript.trim().toLowerCase();
                            const allMoods = [...Object.keys(defaultMoods), ...Object.keys(customMoods)];
                            const found = allMoods.find(m => transcript.includes(m));
                            if (found && moodQueue.includes(found)) {
                                changeMood(moodQueue.indexOf(found));
                                showToast(`Voice: ${found}`);
                            }
                        };
                        recognition.start();
                        showToast("VOICE ACTIVE");
                    }
                } else {
                    if (recognition) recognition.stop();
                    showToast("VOICE OFF");
                }
            });

            async function setupCamera(active) {
                if (active) {
                    try {
                        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { width: 320 } });
                        webcamVideo.srcObject = cameraStream;
                        pipMonitor.classList.add('active');
                        await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/model');
                        await faceapi.nets.faceExpressionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/model');
                        showToast("TRACKING ENGAGED");
                        trackingInterval = setInterval(async () => {
                            if (!cameraEnabled) return;
                            if (webcamVideo.paused || webcamVideo.ended) return;
                            const detections = await faceapi.detectSingleFace(webcamVideo, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                            if (detections && detections.expressions) {
                                const expr = detections.expressions;
                                if (expr.happy > 0.6) changeMood(moodQueue.indexOf('smile'));
                                else if (expr.angry > 0.6) changeMood(moodQueue.indexOf('mad'));
                                else if (expr.sad > 0.6) changeMood(moodQueue.indexOf('bored'));
                                else if (expr.surprised > 0.6) changeMood(moodQueue.indexOf('surprised'));
                            }
                        }, 1000);
                    } catch {
                        cameraEnabled = false;
                        cameraToggle.classList.remove('active');
                        showToast("CAMERA DENIED");
                    }
                } else {
                    pipMonitor.classList.remove('active');
                    if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
                    if (trackingInterval) clearInterval(trackingInterval);
                }
            }
            cameraToggle.addEventListener('click', () => {
                cameraEnabled = !cameraEnabled;
                cameraToggle.classList.toggle('active', cameraEnabled);
                setupCamera(cameraEnabled);
            });

            // Keyboard and drag
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') changeMood((currentIdx + 1) % moodQueue.length);
                else if (e.key === 'ArrowLeft') changeMood((currentIdx - 1 + moodQueue.length) % moodQueue.length);
                else if (e.key === 'ArrowUp') changeMood(Math.floor(Math.random() * moodQueue.length));
                else if (e.key === 'ArrowDown') { moodQueue = Object.keys(defaultMoods); currentIdx = 0; applyMood(moodQueue[0]); resetAutoCycle(); }
                else if (e.key >= '1' && e.key <= '9') { const idx = parseInt(e.key) - 1; if (idx < moodQueue.length) changeMood(idx); }
                else if (e.key === ' ') { e.preventDefault(); changeMood(Math.floor(Math.random() * moodQueue.length)); }
            });

            let dragStartX = 0;
            screen.addEventListener('mousedown', (e) => { dragStartX = e.clientX; });
            screen.addEventListener('mouseup', (e) => {
                if (Math.abs(e.clientX - dragStartX) > 30) {
                    changeMood(e.clientX > dragStartX ? (currentIdx + 1) % moodQueue.length : (currentIdx - 1 + moodQueue.length) % moodQueue.length);
                }
            });
            screen.addEventListener('touchstart', (e) => { dragStartX = e.touches[0].clientX; });
            screen.addEventListener('touchend', (e) => {
                const delta = e.changedTouches[0].clientX - dragStartX;
                if (Math.abs(delta) > 30) {
                    changeMood(delta > 0 ? (currentIdx + 1) % moodQueue.length : (currentIdx - 1 + moodQueue.length) % moodQueue.length);
                }
            });
            screen.addEventListener('dblclick', () => {
                locked = !locked;
                ronbot.classList.toggle('locked', locked);
                if (locked) clearInterval(autoInterval);
                else resetAutoCycle();
                if (navigator.vibrate) navigator.vibrate(50);
            });

            // Init
            updatePlaylistSelect();
            updatePrimaryColor('#ff007f');
            applyMood(moodQueue[0] || 'smile');
            resetAutoCycle();
            window.RobotHead = {
                setMood: (m) => { const idx = moodQueue.indexOf(m); if (idx !== -1) changeMood(idx); },
                nextMood: () => changeMood(),
                randomMood: () => changeMood(Math.floor(Math.random() * moodQueue.length)),
            };
            showToast("RONBOT OS READY");
        })();
    </script>
</body>
</html>
