<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏸 Live Badminton Slot Booking</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { max-width: 700px; width: 100%; }
    h1 { text-align: center; color: #1e3c72; margin-bottom: 0.3em; }
    .subtitle { text-align: center; color: #555; margin-bottom: 1.5em; }
    .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; margin-bottom: 4px; }
    .form-group.full { grid-column: span 2; }
    label { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; color: #333; }
    input, textarea, select { padding: 10px 12px; border: 1px solid #dce1e8; border-radius: 8px; font-size: 0.95rem; background: #fafbfc; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #1e88e5; box-shadow: 0 0 0 3px rgba(30,136,229,0.15); }
    button { background: #1e88e5; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
    button:hover { background: #1565c0; }
    button.secondary { background: #e9eef2; color: #1e3c72; }
    button.secondary:hover { background: #dce4ec; }
    button.danger { background: #ef5350; }
    button.danger:hover { background: #d32f2f; }
    .players-section { margin: 20px 0 10px; }
    .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; background: #f8fafc; padding: 8px 12px; border-radius: 10px; }
    .player-row .num { font-weight: 700; width: 28px; color: #1e3c72; }
    .player-row input { flex: 1; }
    .player-row .paid-btn { background: none; border: 2px solid #dce1e8; border-radius: 8px; padding: 6px 12px; font-weight: bold; font-size: 1rem; cursor: pointer; background: white; transition: 0.2s; color: #666; min-width: 44px; }
    .player-row .paid-btn.paid { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
    .player-row .remove-btn { background: none; border: none; color: #999; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
    .player-row .remove-btn:hover { background: #fee2e2; color: #d32f2f; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0; }
    .preview-box { background: #f1f5f9; border-radius: 12px; padding: 20px; border: 1px dashed #94a3b8; margin-top: 10px; }
    .preview-box pre { white-space: pre-wrap; font-family: monospace; font-size: 0.95rem; line-height: 1.6; color: #1e293b; margin: 0; }
    .admin-panel { background: #fff8e1; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 2px solid #ffc107; }
    .hidden { display: none; }
    #qrPreviewContainer img { max-width: 200px; border-radius: 8px; border: 1px solid #ccc; }
  </style>
</head>
<body>
<div class="container">
  <h1>🏸 Live Badminton Slot Booking</h1>
  <p class="subtitle">Real‑time shared booking – add your name!</p>

  <!-- Admin login / panel -->
  <div class="card hidden" id="adminLoginCard">
    <h3>🔐 Admin Login</h3>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="adminPasswordInput" placeholder="Enter admin password">
    </div>
    <button id="adminLoginBtn">Login</button>
    <button id="adminLogoutBtn" class="secondary hidden">Logout</button>
  </div>

  <!-- Main form (only visible when booking loaded) -->
  <div class="card hidden" id="mainCard">
    <div class="form-grid">
      <div class="form-group">
        <label>📆 Date</label>
        <input type="date" id="dateInput" disabled>
      </div>
      <div class="form-group">
        <label>Day (auto)</label>
        <input type="text" id="dayInput" placeholder="Auto-filled" readonly>
      </div>
      <div class="form-group">
        <label>⏰ Start Time</label>
        <input type="time" id="startTime" disabled>
      </div>
      <div class="form-group">
        <label>End Time</label>
        <input type="time" id="endTime" disabled>
      </div>
      <div class="form-group full">
        <label>🏟️ Venue</label>
        <input type="text" id="venue" value="Forum Sba, Setia Alam" disabled>
      </div>
      <div class="form-group full">
        <label>Court Details</label>
        <input type="text" id="court" disabled>
      </div>
      <div class="form-group">
        <label>💵 Price (RM)</label>
        <input type="number" id="price" step="0.5" min="0" disabled>
      </div>
      <div class="form-group">
        <label>🏸 Shuttle</label>
        <input type="text" id="shuttle" disabled>
      </div>
      <div class="form-group full">
        <label>👤 Host</label>
        <input type="text" id="host" disabled>
      </div>
      <!-- QR (admin only) -->
      <div class="form-group full hidden" id="qrSection">
        <label>💳 QR Label</label>
        <input type="text" id="qrLabel" disabled>
      </div>
      <div class="form-group full hidden" id="qrImageSection">
        <label>📷 QR Image</label>
        <input type="file" id="qrImageInput" accept="image/*" style="display:none;" disabled>
        <button type="button" id="qrImageBtn" class="secondary" disabled>🖼️ Choose QR</button>
        <button type="button" id="qrRemoveBtn" class="danger" style="display:none;" disabled>🗑️ Remove QR</button>
        <div id="qrPreviewContainer" style="margin-top:10px; display:none;">
          <img id="qrPreviewImg" alt="QR Payment">
        </div>
      </div>
    </div>

    <!-- Player slots (players can add themselves here) -->
    <div class="players-section">
      <label style="font-weight:600;">👥 Players (click on an open slot to add your name)</label>
      <div id="playersContainer"></div>
      <!-- "Add Slot" button only for admin -->
      <button class="secondary hidden" id="addPlayerBtn" style="margin-top:8px;">+ Add Player Slot (Admin)</button>
    </div>

    <div class="actions">
      <button id="copyBtn" class="secondary">📋 Copy Announcement</button>
    </div>

    <div>
      <label style="font-weight:600;">📄 Announcement Preview:</label>
      <div class="preview-box" id="preview"></div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔥 Your Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAjP-ZKJdvM7FF_C9tsqf_UytY-A4lIWGE",
    authDomain: "badminton-booking-f9f0a.firebaseapp.com",
    databaseURL: "https://badminton-booking-f9f0a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "badminton-booking-f9f0a",
    storageBucket: "badminton-booking-f9f0a.firebasestorage.app",
    messagingSenderId: "189775108709",
    appId: "1:189775108709:web:9813bd79c1550df3cec48c",
    measurementId: "G-NSMY5B1F17" // Not used in this app, but harmless
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Admin password – CHANGE THIS to your own secret password
  const ADMIN_PASSWORD = "badminton123";
  let isAdmin = false;

  // DOM references
  const adminLoginCard = document.getElementById('adminLoginCard');
  const adminLoginBtn = document.getElementById('adminLoginBtn');
  const adminLogoutBtn = document.getElementById('adminLogoutBtn');
  const adminPasswordInput = document.getElementById('adminPasswordInput');
  const mainCard = document.getElementById('mainCard');
  const dateInput = document.getElementById('dateInput');
  const dayInput = document.getElementById('dayInput');
  const startTime = document.getElementById('startTime');
  const endTime = document.getElementById('endTime');
  const venue = document.getElementById('venue');
  const court = document.getElementById('court');
  const price = document.getElementById('price');
  const shuttle = document.getElementById('shuttle');
  const host = document.getElementById('host');
  const qrLabel = document.getElementById('qrLabel');
  const qrSection = document.getElementById('qrSection');
  const qrImageSection = document.getElementById('qrImageSection');
  const qrImageInput = document.getElementById('qrImageInput');
  const qrImageBtn = document.getElementById('qrImageBtn');
  const qrRemoveBtn = document.getElementById('qrRemoveBtn');
  const qrPreviewContainer = document.getElementById('qrPreviewContainer');
  const qrPreviewImg = document.getElementById('qrPreviewImg');
  const playersContainer = document.getElementById('playersContainer');
  const addPlayerBtn = document.getElementById('addPlayerBtn');
  const previewDiv = document.getElementById('preview');
  const copyBtn = document.getElementById('copyBtn');

  const bookingRef = ref(db, 'bookings/current');
  let currentData = null;

  // ---------- Helpers ----------
  function format12Hour(time24) {
    if (!time24) return "";
    const [h, m] = time24.split(':').map(Number);
    if (isNaN(h) || isNaN(m)) return "";
    const ampm = h >= 12 ? 'PM' : 'AM';
    let hour12 = h % 12;
    if (hour12 === 0) hour12 = 12;
    return `${hour12}:${m.toString().padStart(2, '0')} ${ampm}`;
  }

  function formatDateDMY(dateStr) {
    if (!dateStr) return "";
    const [year, month, day] = dateStr.split('-');
    return `${parseInt(day)}/${parseInt(month)}/${year}`;
  }

  function getDayFromDate(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr + "T00:00:00");
    const days = ["AHAD", "ISNIN", "SELASA", "RABU", "KHAMIS", "JUMAAT", "SABTU"];
    return days[d.getDay()];
  }

  // ---------- Admin login / logout ----------
  adminLoginBtn.addEventListener('click', () => {
    if (adminPasswordInput.value === ADMIN_PASSWORD) {
      isAdmin = true;
      adminLoginBtn.classList.add('hidden');
      adminLogoutBtn.classList.remove('hidden');
      adminPasswordInput.value = '';
      setAdminMode(true);
    } else {
      alert("Wrong password!");
    }
  });

  adminLogoutBtn.addEventListener('click', () => {
    isAdmin = false;
    adminLoginBtn.classList.remove('hidden');
    adminLogoutBtn.classList.add('hidden');
    setAdminMode(false);
  });

  function setAdminMode(enable) {
    const adminFields = [dateInput, startTime, endTime, venue, court, price, shuttle, host, qrLabel, qrImageBtn, qrRemoveBtn];
    adminFields.forEach(el => { if (el) el.disabled = !enable; });
    addPlayerBtn.classList.toggle('hidden', !enable);
    qrSection.classList.toggle('hidden', !enable);
    qrImageSection.classList.toggle('hidden', !enable);
    if (!enable) qrRemoveBtn.style.display = 'none';
  }

  // ---------- Render UI from database ----------
  function renderFromData(data) {
    if (!data) {
      mainCard.classList.add('hidden');
      return;
    }
    mainCard.classList.remove('hidden');
    currentData = data;

    dateInput.value = data.date || '';
    dayInput.value = data.day || '';
    startTime.value = data.start || '';
    endTime.value = data.end || '';
    venue.value = data.venue || '';
    court.value = data.court || '';
    price.value = data.price || '';
    shuttle.value = data.shuttle || '';
    host.value = data.host || '';
    qrLabel.value = data.qrLabel || '';

    if (data.qrDataUrl) {
      qrPreviewImg.src = data.qrDataUrl;
      qrPreviewContainer.style.display = 'block';
      if (isAdmin) qrRemoveBtn.style.display = 'inline-block';
    } else {
      qrPreviewImg.src = '';
      qrPreviewContainer.style.display = 'none';
      qrRemoveBtn.style.display = 'none';
    }

    renderPlayers(data.players || []);
    updatePreview(data);
  }

  function renderPlayers(players) {
    playersContainer.innerHTML = '';
    players.forEach((player, idx) => {
      const row = document.createElement('div');
      row.className = 'player-row';
      const isOccupied = player.name && player.name.trim() !== '';
      row.innerHTML = `
        <span class="num">${idx + 1}.</span>
        ${isOccupied 
          ? `<span style="flex:1;">${escapeHtml(player.name)}</span>`
          : `<input type="text" class="player-name" placeholder="Your name" data-index="${idx}" ${isAdmin ? '' : ''}>`
        }
        <button class="paid-btn ${player.paid ? 'paid' : ''}" data-index="${idx}" ${!isAdmin && !isOccupied ? 'disabled' : ''}>✅</button>
        ${isAdmin ? `<button class="remove-btn" data-index="${idx}">✕</button>` : ''}
      `;
      if (!isAdmin && !isOccupied) {
        row.querySelector('.player-name').removeAttribute('readonly');
      }
      playersContainer.appendChild(row);
    });

    document.querySelectorAll('.player-name').forEach(input => {
      input.addEventListener('change', (e) => {
        const idx = e.target.dataset.index;
        const name = e.target.value.trim();
        if (name && currentData) {
          const updatedPlayers = [...currentData.players];
          updatedPlayers[idx] = { ...updatedPlayers[idx], name: name };
          updateBooking({ players: updatedPlayers });
        }
      });
    });

    document.querySelectorAll('.paid-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = e.target.dataset.index;
        if (currentData && currentData.players[idx]) {
          const updatedPlayers = [...currentData.players];
          updatedPlayers[idx] = { ...updatedPlayers[idx], paid: !updatedPlayers[idx].paid };
          updateBooking({ players: updatedPlayers });
        }
      });
    });

    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = e.target.dataset.index;
        const updatedPlayers = [...currentData.players];
        updatedPlayers.splice(idx, 1);
        updateBooking({ players: updatedPlayers });
      });
    });
  }

  addPlayerBtn.addEventListener('click', () => {
    if (!isAdmin || !currentData) return;
    const updatedPlayers = [...currentData.players, { name: "", paid: false }];
    updateBooking({ players: updatedPlayers });
  });

  // ---------- Admin field listeners ----------
  function setupAdminFieldListeners() {
    const fields = [
      { el: dateInput, key: 'date' },
      { el: startTime, key: 'start' },
      { el: endTime, key: 'end' },
      { el: venue, key: 'venue' },
      { el: court, key: 'court' },
      { el: price, key: 'price' },
      { el: shuttle, key: 'shuttle' },
      { el: host, key: 'host' },
      { el: qrLabel, key: 'qrLabel' }
    ];
    fields.forEach(({ el, key }) => {
      el.addEventListener('change', () => {
        if (isAdmin && currentData) {
          updateBooking({ [key]: el.value });
        }
      });
    });
    dateInput.addEventListener('change', () => {
      dayInput.value = getDayFromDate(dateInput.value);
      if (isAdmin && currentData) {
        updateBooking({ date: dateInput.value, day: dayInput.value });
      }
    });
  }

  qrImageBtn.addEventListener('click', () => {
    if (!isAdmin) return;
    qrImageInput.click();
  });
  qrImageInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      qrPreviewImg.src = dataUrl;
      qrPreviewContainer.style.display = 'block';
      qrRemoveBtn.style.display = 'inline-block';
      updateBooking({ qrDataUrl: dataUrl });
    };
    reader.readAsDataURL(file);
  });
  qrRemoveBtn.addEventListener('click', () => {
    qrPreviewImg.src = '';
    qrPreviewContainer.style.display = 'none';
    qrRemoveBtn.style.display = 'none';
    updateBooking({ qrDataUrl: null });
  });

  // ---------- Firebase update ----------
  function updateBooking(partial) {
    if (!currentData) return;
    const updated = { ...currentData, ...partial };
    set(bookingRef, updated);
  }

  // ---------- Preview builder ----------
  function updatePreview(data) {
    if (!data) return;
    const dateVal = formatDateDMY(data.date) || ".........";
    const dayVal = data.day || ".......";
    const start = format12Hour(data.start) || ".....";
    const end = format12Hour(data.end) || ".....";
    const venueVal = data.venue || "................";
    const courtVal = data.court || "................";
    const priceVal = data.price || "0";
    const shuttleVal = data.shuttle || "......";
    const hostVal = data.host || "......";
    const qrLabelText = data.qrLabel ? `💳 ${data.qrLabel}\n` : (data.qrDataUrl ? "💳 Scan QR to pay:\n" : "");

    let text = `📆 : ${dateVal} , ${dayVal}\n`;
    text += `⏰ : ${start} - ${end}\n`;
    text += `🏟️ : ${venueVal}\n`;
    text += `        (${courtVal})\n`;
    text += `💵 : RM${priceVal} Per player\n\n`;
    text += `🏸: Shuttle: ${shuttleVal}\n\n`;
    if (qrLabelText) text += qrLabelText + '\n';
    text += `Done payment sila tick ✅ ‼️\n\n`;
    text += `Host ${hostVal}\n\n`;

    (data.players || []).forEach((p, i) => {
      const num = i + 1;
      const name = p.name || "(Open)";
      const paidMark = p.paid ? "✅️" : "";
      text += `${num}. ${name}${paidMark}\n`;
    });

    previewDiv.innerHTML = `<pre>${text}</pre>`;
    if (data.qrDataUrl) {
      const imgDiv = document.createElement('div');
      imgDiv.style.marginTop = '12px';
      imgDiv.style.textAlign = 'center';
      const img = document.createElement('img');
      img.src = data.qrDataUrl;
      img.alt = 'QR Payment';
      img.style.maxWidth = '200px';
      img.style.borderRadius = '8px';
      img.style.border = '1px solid #ccc';
      imgDiv.appendChild(img);
      previewDiv.appendChild(imgDiv);
    }
  }

  copyBtn.addEventListener('click', async () => {
    const text = previewDiv.querySelector('pre')?.textContent || '';
    try {
      await navigator.clipboard.writeText(text);
      alert("✅ Text copied! (QR image must be shared separately)");
    } catch {
      alert("Copy failed. Please manually select and copy the announcement.");
    }
  });

  // ---------- Real-time listener ----------
  onValue(bookingRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) {
      const defaultBooking = {
        date: "", day: "", start: "", end: "",
        venue: "Forum Sba, Setia Alam", court: "", price: "", shuttle: "", host: "",
        qrDataUrl: null, qrLabel: "",
        players: []
      };
      set(bookingRef, defaultBooking);
    } else {
      renderFromData(data);
    }
  });

  // Initialize
  adminLoginCard.classList.remove('hidden');
  setupAdminFieldListeners();

  function escapeHtml(text) {
    return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
